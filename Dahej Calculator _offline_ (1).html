document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

=\"ca7c5c2d-aa44-408b-b935-0e9c8607c3e1\"><\u002Fscript>\n<script src=\"5c05e1ee-09a8-4202-b054-d905b0e8c8ea\"><\u002Fscript>\n<style>\n  /* ===== Tokens ===== */\n  :root {\n    --saffron: #FF6B00;\n    --saffron-2: #FF8A2A;\n    --maroon: #8B0000;\n    --maroon-2: #5C0000;\n    --gold: #D4AF37;\n    --gold-2: #F2CD5C;\n    --bg: #1A0A00;\n    --bg-2: #120700;\n    --surface: #2D1500;\n    --surface-2: #3A1C04;\n    --line: rgba(212, 175, 55, 0.22);\n    --line-strong: rgba(212, 175, 55, 0.45);\n    --text: #FFF5E0;\n    --text-dim: rgba(255, 245, 224, 0.62);\n    --text-mute: rgba(255, 245, 224, 0.4);\n    --success: #2ECC71;\n    --warn: #F1C40F;\n    --danger: #E74C3C;\n    --radius: 14px;\n    --radius-lg: 22px;\n    --shadow-soft: 0 10px 40px rgba(0,0,0,0.5), 0 0 0 1px var(--line) inset;\n    --shadow-gold: 0 0 0 1px var(--line) inset, 0 18px 60px rgba(212,175,55,0.08), 0 6px 20px rgba(0,0,0,0.5);\n  }\n  /* Light mode override */\n  html[data-theme=\"light\"] {\n    --bg: #FFF6E5;\n    --bg-2: #FFE9C5;\n    --surface: #FFFBF1;\n    --surface-2: #FFF1D6;\n    --line: rgba(139, 0, 0, 0.18);\n    --line-strong: rgba(139, 0, 0, 0.35);\n    --text: #2A0A00;\n    --text-dim: rgba(42, 10, 0, 0.7);\n    --text-mute: rgba(42, 10, 0, 0.5);\n    --gold: #B8860B;\n    --shadow-soft: 0 10px 40px rgba(139,0,0,0.08), 0 0 0 1px var(--line) inset;\n    --shadow-gold: 0 0 0 1px var(--line) inset, 0 12px 40px rgba(139,0,0,0.08);\n  }\n\n  * { box-sizing: border-box; }\n  html, body { margin: 0; padding: 0; }\n  body {\n    font-family: \"DM Sans\", system-ui, -apple-system, sans-serif;\n    background:\n      radial-gradient(900px 600px at 85% -10%, rgba(255,107,0,0.18), transparent 60%),\n      radial-gradient(800px 600px at -10% 110%, rgba(139,0,0,0.25), transparent 55%),\n      var(--bg);\n    color: var(--text);\n    min-height: 100vh;\n    overflow-x: hidden;\n    -webkit-font-smoothing: antialiased;\n  }\n  html[data-theme=\"light\"] body {\n    background:\n      radial-gradient(900px 600px at 85% -10%, rgba(255,107,0,0.18), transparent 60%),\n      radial-gradient(800px 600px at -10% 110%, rgba(212,175,55,0.18), transparent 55%),\n      var(--bg);\n  }\n  .display { font-family: \"Yatra One\", serif; letter-spacing: 0.5px; }\n  .deva { font-family: \"Tiro Devanagari Hindi\", serif; }\n  .mono { font-family: \"JetBrains Mono\", ui-monospace, monospace; }\n\n  /* ===== Decorative top strip / ticker ===== */\n  .stats-ticker {\n    position: sticky; top: 0; z-index: 50;\n    background: linear-gradient(90deg, var(--maroon-2), var(--maroon));\n    color: var(--gold-2);\n    border-bottom: 1px solid var(--line-strong);\n    overflow: hidden;\n    font-weight: 600;\n    font-size: 13px;\n    height: 36px;\n    display: flex; align-items: center;\n  }\n  .ticker-track {\n    display: inline-flex;\n    gap: 48px;\n    white-space: nowrap;\n    animation: marquee 60s linear infinite;\n    padding-left: 100%;\n  }\n  .ticker-track:hover { animation-play-state: paused; }\n  .ticker-item { display: inline-flex; align-items: center; gap: 8px; }\n  .ticker-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--gold); }\n  @keyframes marquee {\n    from { transform: translateX(0); }\n    to { transform: translateX(-50%); }\n  }\n\n  /* ===== Container ===== */\n  .container { max-width: 1180px; margin: 0 auto; padding: 28px 22px 64px; }\n  @media (min-width: 720px) { .container { padding: 40px 32px 80px; } }\n\n  /* ===== Header ===== */\n  .hero {\n    position: relative;\n    text-align: center;\n    padding: 36px 12px 28px;\n    border-radius: var(--radius-lg);\n    background:\n      radial-gradient(600px 220px at 50% 0%, rgba(255,107,0,0.25), transparent 60%),\n      linear-gradient(180deg, rgba(212,175,55,0.06), transparent 60%),\n      var(--surface);\n    box-shadow: var(--shadow-gold);\n    overflow: hidden;\n  }\n  .hero::before, .hero::after {\n    content: \"\"; position: absolute; inset: 0;\n    background-image:\n      radial-gradient(2px 2px at 20% 30%, rgba(212,175,55,0.55), transparent 60%),\n      radial-gradient(2px 2px at 80% 70%, rgba(255,107,0,0.55), transparent 60%),\n      radial-gradient(1.5px 1.5px at 40% 80%, rgba(212,175,55,0.5), transparent 60%),\n      radial-gradient(1.5px 1.5px at 70% 20%, rgba(255,107,0,0.45), transparent 60%);\n    pointer-events: none;\n  }\n  .hero::after {\n    background:\n      repeating-linear-gradient(45deg, transparent 0 18px, rgba(212,175,55,0.04) 18px 19px);\n    mix-blend-mode: screen;\n  }\n  .theme-toggle {\n    position: absolute; top: 16px; right: 16px;\n    background: rgba(0,0,0,0.25);\n    color: var(--text);\n    border: 1px solid var(--line);\n    padding: 8px 10px;\n    border-radius: 999px;\n    cursor: pointer;\n    display: inline-flex; align-items: center; gap: 6px;\n    font-size: 13px;\n    z-index: 2;\n  }\n  html[data-theme=\"light\"] .theme-toggle { background: rgba(255,255,255,0.6); }\n  .lang-chip {\n    position: absolute; top: 16px; left: 16px;\n    font-size: 12px; letter-spacing: 0.18em;\n    color: var(--gold);\n    background: rgba(0,0,0,0.25);\n    border: 1px solid var(--line);\n    padding: 6px 10px; border-radius: 999px;\n    z-index: 2;\n  }\n  html[data-theme=\"light\"] .lang-chip { background: rgba(255,255,255,0.6); }\n\n  .hero h1 {\n    margin: 24px 0 6px;\n    font-size: clamp(40px, 8vw, 86px);\n    line-height: 1;\n    color: var(--gold);\n    text-shadow: 0 6px 0 rgba(0,0,0,0.25), 0 0 40px rgba(212,175,55,0.18);\n  }\n  .hero h1 .emoji {\n    display: inline-block;\n    transform: translateY(-6px);\n    margin-left: 6px;\n    filter: drop-shadow(0 4px 10px rgba(212,175,55,0.4));\n  }\n  .hero .hindi {\n    color: var(--saffron-2); font-size: clamp(18px, 3vw, 26px);\n    letter-spacing: 0.04em;\n    margin-bottom: 4px;\n  }\n  .hero .tagline {\n    color: var(--text);\n    font-weight: 700;\n    font-size: clamp(15px, 2.2vw, 19px);\n    margin: 6px 0 4px;\n  }\n  .hero .subtext {\n    color: var(--text-dim);\n    font-size: 13px;\n    max-width: 560px;\n    margin: 8px auto 0;\n    line-height: 1.5;\n  }\n  .hero .meta-row {\n    display: flex; flex-wrap: wrap; gap: 8px; justify-content: center;\n    margin-top: 18px;\n    position: relative; z-index: 2;\n  }\n  .pill {\n    display: inline-flex; align-items: center; gap: 6px;\n    padding: 6px 10px; border-radius: 999px;\n    font-size: 12px; font-weight: 600;\n    background: rgba(255,245,224,0.08);\n    border: 1px solid var(--line);\n    color: var(--text-dim);\n  }\n  .pill .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--gold); }\n\n  /* ===== Tabs ===== */\n  .tabs {\n    margin: 32px auto 0;\n    display: inline-flex;\n    width: 100%;\n    background: var(--surface);\n    border-radius: 999px;\n    padding: 6px;\n    border: 1px solid var(--line);\n    gap: 6px;\n  }\n  .tab-btn {\n    flex: 1;\n    background: transparent;\n    color: var(--text-dim);\n    border: none;\n    padding: 14px 18px;\n    border-radius: 999px;\n    font-size: 15px;\n    font-weight: 700;\n    cursor: pointer;\n    transition: all 0.2s ease;\n    display: inline-flex; align-items: center; justify-content: center; gap: 8px;\n  }\n  .tab-btn[aria-selected=\"true\"] {\n    background: linear-gradient(135deg, var(--saffron), var(--maroon));\n    color: #fff;\n    box-shadow: 0 6px 22px rgba(255,107,0,0.4), inset 0 0 0 1px rgba(255,255,255,0.18);\n  }\n  .tab-btn[aria-selected=\"true\"] .tier { background: rgba(255,255,255,0.2); color: #fff; }\n  .tab-btn:hover:not([aria-selected=\"true\"]) { color: var(--text); }\n\n  /* ===== Form grid ===== */\n  .form-grid {\n    display: grid;\n    grid-template-columns: 1fr;\n    gap: 14px;\n    margin-top: 22px;\n  }\n  @media (min-width: 760px) {\n    .form-grid { grid-template-columns: 1fr 1fr; gap: 16px; }\n    .form-grid .full { grid-column: 1 / -1; }\n  }\n\n  .field {\n    background: var(--surface);\n    border: 1px solid var(--line);\n    border-radius: var(--radius);\n    padding: 14px 16px 16px;\n    position: relative;\n    transition: border-color 0.2s, box-shadow 0.2s, transform 0.2s;\n  }\n  .field:focus-within {\n    border-color: var(--gold);\n    box-shadow: 0 0 0 3px rgba(212,175,55,0.18);\n  }\n  .field-label {\n    display: flex; align-items: center; justify-content: space-between;\n    font-size: 12px;\n    font-weight: 600;\n    color: var(--gold);\n    letter-spacing: 0.08em;\n    text-transform: uppercase;\n    margin-bottom: 8px;\n  }\n  .field-label .tip {\n    color: var(--text-mute);\n    font-size: 11px;\n    letter-spacing: 0.04em;\n    text-transform: none;\n    font-weight: 500;\n  }\n  .field-tooltip {\n    margin-top: 8px;\n    font-size: 12px;\n    color: var(--text-dim);\n    background: rgba(0,0,0,0.25);\n    border-left: 2px solid var(--saffron);\n    padding: 8px 10px;\n    border-radius: 6px;\n    display: none;\n    line-height: 1.45;\n  }\n  html[data-theme=\"light\"] .field-tooltip { background: rgba(255,255,255,0.7); }\n  .field:focus-within .field-tooltip { display: block; }\n\n  .input, select.input {\n    width: 100%;\n    background: var(--bg-2);\n    border: 1px solid var(--line);\n    color: var(--text);\n    padding: 12px 14px;\n    border-radius: 10px;\n    font-size: 15px;\n    font-family: inherit;\n    appearance: none;\n    -webkit-appearance: none;\n    outline: none;\n  }\n  html[data-theme=\"light\"] .input { background: #fff; }\n  select.input {\n    background-image:\n      linear-gradient(45deg, transparent 50%, var(--gold) 50%),\n      linear-gradient(135deg, var(--gold) 50%, transparent 50%);\n    background-position: calc(100% - 18px) 50%, calc(100% - 13px) 50%;\n    background-size: 5px 5px, 5px 5px;\n    background-repeat: no-repeat;\n    padding-right: 36px;\n    cursor: pointer;\n  }\n  .input:focus { border-color: var(--gold); }\n\n  /* Slider */\n  .slider-wrap { padding: 4px 2px 2px; }\n  .slider-row {\n    display: flex; justify-content: space-between; align-items: baseline;\n    margin-bottom: 6px;\n  }\n  .slider-value {\n    font-family: \"Yatra One\", serif;\n    color: var(--gold);\n    font-size: 22px;\n  }\n  .slider-band {\n    color: var(--text-dim); font-size: 12px;\n  }\n  input[type=\"range\"] {\n    width: 100%;\n    -webkit-appearance: none; appearance: none;\n    height: 8px;\n    border-radius: 999px;\n    background: linear-gradient(90deg, var(--saffron) var(--p, 50%), rgba(255,245,224,0.12) var(--p, 50%));\n    outline: none;\n    cursor: grab;\n  }\n  input[type=\"range\"]::-webkit-slider-thumb {\n    -webkit-appearance: none; appearance: none;\n    width: 22px; height: 22px;\n    border-radius: 50%;\n    background: radial-gradient(circle at 30% 30%, var(--gold-2), var(--gold));\n    border: 2px solid var(--bg);\n    box-shadow: 0 0 0 1px var(--gold), 0 4px 10px rgba(212,175,55,0.4);\n    cursor: grab;\n  }\n  input[type=\"range\"]::-moz-range-thumb {\n    width: 22px; height: 22px;\n    border-radius: 50%;\n    background: radial-gradient(circle at 30% 30%, var(--gold-2), var(--gold));\n    border: 2px solid var(--bg);\n    box-shadow: 0 0 0 1px var(--gold), 0 4px 10px rgba(212,175,55,0.4);\n    cursor: grab;\n  }\n\n  /* Pill toggle */\n  .pill-toggle {\n    display: flex; gap: 8px; flex-wrap: wrap;\n  }\n  .pill-toggle button {\n    padding: 10px 14px;\n    border-radius: 999px;\n    background: var(--bg-2);\n    color: var(--text-dim);\n    border: 1px solid var(--line);\n    font-family: inherit; font-size: 13px; font-weight: 600;\n    cursor: pointer;\n    transition: all 0.18s;\n  }\n  html[data-theme=\"light\"] .pill-toggle button { background: #fff; }\n  .pill-toggle button[aria-pressed=\"true\"] {\n    background: linear-gradient(135deg, var(--saffron), var(--maroon));\n    border-color: transparent;\n    color: #fff;\n    box-shadow: 0 4px 14px rgba(255,107,0,0.35);\n  }\n\n  /* Checkbox */\n  .checks { display: flex; flex-direction: column; gap: 10px; }\n  .check {\n    display: flex; align-items: center; gap: 10px;\n    padding: 10px 12px;\n    background: var(--bg-2);\n    border: 1px solid var(--line);\n    border-radius: 10px;\n    cursor: pointer;\n    user-select: none;\n    transition: all 0.18s;\n  }\n  html[data-theme=\"light\"] .check { background: #fff; }\n  .check input { display: none; }\n  .check .box {\n    width: 20px; height: 20px;\n    border-radius: 5px;\n    background: transparent;\n    border: 1.5px solid var(--line-strong);\n    display: inline-flex; align-items: center; justify-content: center;\n    color: transparent;\n    flex-shrink: 0;\n    transition: all 0.18s;\n  }\n  .check input:checked + .box {\n    background: var(--gold); border-color: var(--gold); color: var(--maroon-2);\n    box-shadow: 0 0 0 4px rgba(212,175,55,0.12);\n  }\n  .check .label { font-size: 14px; font-weight: 500; }\n  .check .meta { color: var(--text-mute); font-size: 12px; margin-left: auto; }\n  .conditional { display: none; margin-top: 10px; }\n  .conditional.active { display: block; }\n\n  /* Tier badges */\n  .tier {\n    display: inline-flex; align-items: center; justify-content: center;\n    min-width: 24px; padding: 2px 6px;\n    border-radius: 6px;\n    font-size: 11px; font-weight: 800;\n    margin-left: 8px;\n    color: #1A0A00;\n    background: #999;\n  }\n  .tier.t-sp { background: linear-gradient(135deg, #FFD700, #FFA500); color: #2A0A00; }\n  .tier.t-s  { background: #FFD700; color: #2A0A00; }\n  .tier.t-a  { background: #FF6B00; color: #fff; }\n  .tier.t-b  { background: #2ECC71; color: #00270e; }\n  .tier.t-c  { background: #3498db; color: #fff; }\n  .tier.t-d  { background: #8e44ad; color: #fff; }\n  .tier.t-f  { background: #555; color: #ddd; }\n\n  /* Calculate button */\n  .calculate-btn {\n    width: 100%;\n    margin-top: 22px;\n    padding: 20px 24px;\n    border: none;\n    border-radius: var(--radius);\n    background: linear-gradient(135deg, var(--saffron), var(--maroon));\n    color: #fff;\n    font-family: \"Yatra One\", serif;\n    font-size: 22px;\n    letter-spacing: 0.04em;\n    cursor: pointer;\n    position: relative;\n    overflow: hidden;\n    box-shadow: 0 14px 40px rgba(255,107,0,0.35), inset 0 0 0 1px rgba(255,255,255,0.18);\n    transition: transform 0.15s, box-shadow 0.2s;\n  }\n  .calculate-btn:hover {\n    transform: translateY(-1px);\n    box-shadow: 0 18px 50px rgba(255,107,0,0.5), inset 0 0 0 1px rgba(255,255,255,0.25);\n  }\n  .calculate-btn::after {\n    content: \"\"; position: absolute; inset: 0;\n    background: linear-gradient(120deg, transparent 30%, rgba(255,255,255,0.25) 50%, transparent 70%);\n    transform: translateX(-100%);\n    transition: transform 0.6s;\n  }\n  .calculate-btn:hover::after { transform: translateX(100%); }\n  .calculate-btn .loading { display: none; }\n  .calculate-btn[data-loading=\"true\"] .normal { display: none; }\n  .calculate-btn[data-loading=\"true\"] .loading { display: inline-flex; align-items: center; gap: 8px; }\n  .dots::after {\n    content: \"\";\n    animation: dots 1.4s infinite steps(4, end);\n  }\n  @keyframes dots {\n    0%, 20% { content: \"\"; }\n    40% { content: \".\"; }\n    60% { content: \"..\"; }\n    80%, 100% { content: \"...\"; }\n  }\n\n  /* ===== Special notice ===== */\n  .notice {\n    margin-top: 14px;\n    padding: 12px 14px;\n    border-radius: 12px;\n    background: rgba(212,175,55,0.08);\n    border: 1px dashed var(--line-strong);\n    color: var(--text);\n    font-size: 13.5px;\n    display: none;\n  }\n  .notice.show { display: flex; gap: 10px; align-items: center; animation: slideDown 0.3s; }\n  .notice .icon { font-size: 20px; }\n  @keyframes slideDown {\n    from { opacity: 0; transform: translateY(-6px); }\n    to { opacity: 1; transform: translateY(0); }\n  }\n\n  /* ===== Results ===== */\n  .results {\n    margin-top: 36px;\n    display: none;\n  }\n  .results.show {\n    display: block;\n    animation: slideUp 0.6s cubic-bezier(0.22, 1, 0.36, 1);\n  }\n  @keyframes slideUp {\n    from { opacity: 0; transform: translateY(30px); }\n    to { opacity: 1; transform: translateY(0); }\n  }\n  .result-hero {\n    text-align: center;\n    padding: 36px 22px 30px;\n    border-radius: var(--radius-lg);\n    background:\n      radial-gradient(500px 200px at 50% 0%, rgba(255,107,0,0.25), transparent 60%),\n      linear-gradient(180deg, var(--surface-2), var(--surface));\n    border: 1px solid var(--line);\n    box-shadow: var(--shadow-soft);\n    position: relative;\n    overflow: hidden;\n  }\n  .result-hero .label {\n    color: var(--gold);\n    font-size: 12px; letter-spacing: 0.2em; text-transform: uppercase;\n    font-weight: 700;\n  }\n  .result-amount {\n    font-family: \"Yatra One\", serif;\n    font-size: clamp(56px, 11vw, 130px);\n    line-height: 1;\n    color: var(--gold);\n    text-shadow: 0 8px 0 rgba(0,0,0,0.3), 0 0 60px rgba(212,175,55,0.3);\n    margin: 12px 0 6px;\n    letter-spacing: 0.02em;\n  }\n  .result-amount .currency { color: var(--gold-2); margin-right: 4px; font-size: 0.75em; vertical-align: 0.06em; }\n  .result-sub {\n    color: var(--text-dim);\n    font-size: 14px;\n  }\n  .verdict {\n    margin-top: 22px;\n    padding: 18px 22px;\n    border-radius: var(--radius);\n    background: rgba(0,0,0,0.25);\n    border: 1px solid var(--line);\n    display: inline-flex; align-items: center; gap: 14px;\n    font-weight: 700;\n    font-size: 18px;\n  }\n  html[data-theme=\"light\"] .verdict { background: rgba(255,255,255,0.6); }\n  .verdict .emoji { font-size: 28px; }\n  .verdict[data-tier=\"low\"]    { color: var(--success); box-shadow: 0 0 0 1px rgba(46,204,113,0.4), 0 0 40px rgba(46,204,113,0.15); }\n  .verdict[data-tier=\"mid\"]    { color: var(--warn); box-shadow: 0 0 0 1px rgba(241,196,15,0.4), 0 0 40px rgba(241,196,15,0.15); }\n  .verdict[data-tier=\"high\"]   { color: var(--saffron-2); box-shadow: 0 0 0 1px rgba(255,107,0,0.5), 0 0 40px rgba(255,107,0,0.2); }\n  .verdict[data-tier=\"vhigh\"]  { color: var(--danger); box-shadow: 0 0 0 1px rgba(231,76,60,0.5), 0 0 40px rgba(231,76,60,0.2); animation: pulseRed 1.6s ease-in-out infinite; }\n  .verdict[data-tier=\"insane\"] { color: #ff5a5a; animation: insaneFlash 0.9s linear infinite; }\n  @keyframes pulseRed {\n    0%, 100% { box-shadow: 0 0 0 1px rgba(231,76,60,0.5), 0 0 40px rgba(231,76,60,0.2); }\n    50% { box-shadow: 0 0 0 2px rgba(231,76,60,0.8), 0 0 60px rgba(231,76,60,0.5); }\n  }\n  @keyframes insaneFlash {\n    0%, 100% { box-shadow: 0 0 0 2px rgba(231,76,60,0.9), 0 0 60px rgba(231,76,60,0.4); background: rgba(231,76,60,0.18); }\n    50% { box-shadow: 0 0 0 3px rgba(255,80,80,1), 0 0 80px rgba(231,76,60,0.7); background: rgba(231,76,60,0.32); }\n  }\n  .verdict-text { display: flex; flex-direction: column; align-items: flex-start; gap: 4px; line-height: 1.2; }\n  .verdict-quip { font-size: 13px; font-weight: 500; color: var(--text-dim); text-align: left; max-width: 460px; }\n\n  /* Reality-check warnings under big number */\n  .reality-check {\n    display: none;\n    margin: 14px auto 0;\n    max-width: 640px;\n    padding: 12px 14px;\n    border-radius: 12px;\n    font-size: 13px;\n    line-height: 1.5;\n    text-align: left;\n  }\n  .reality-check.show { display: block; animation: slideDown 0.3s; }\n  .reality-check.warn {\n    background: rgba(241,196,15,0.1);\n    border: 1px solid rgba(241,196,15,0.4);\n    color: var(--warn);\n  }\n  .reality-check.danger {\n    background: rgba(231,76,60,0.1);\n    border: 1px solid rgba(231,76,60,0.4);\n    color: var(--danger);\n  }\n  .reality-check.ok {\n    background: rgba(46,204,113,0.1);\n    border: 1px solid rgba(46,204,113,0.4);\n    color: var(--success);\n  }\n  .reality-check b { color: var(--text); font-weight: 700; }\n\n  /* Body screen flash for >1Cr */\n  body.flashing::after {\n    content: \"\";\n    position: fixed; inset: 0; pointer-events: none;\n    box-shadow: inset 0 0 0 8px rgba(231,76,60,0.9);\n    animation: flashOut 1.2s ease-out forwards;\n    z-index: 1 1fr; align-items: center; gap: 22px;\n    padding: 18px;\n    background: rgba(0,0,0,0.25);\n    border: 1px solid var(--line);\n    border-radius: 14px;\n  }\n  html[data-theme=\"light\"] .years-hero { background: rgba(255,255,255,0.55); }\n  @media (max-width: 640px) { .years-hero { grid-template-columns: 1fr; text-align: center; } }\n  .years-number {\n    font-family: \"Yatra One\", serif;\n    font-size: clamp(56px, 12vw, 110px);\n    line-height: 1;\n    color: var(--danger);\n    text-shadow: 0 6px 0 rgba(0,0,0,0.3);\n    letter-spacing: 0.02em;\n  }\n  .years-number.ok { color: var(--success); }\n  .years-number.warn { color: var(--warn); }\n  .years-number.bad { color: var(--saffron-2); }\n  .years-context { color: var(--text); font-size: 17px; line-height: 1.5; }\n  .years-mini {\n    display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px;\n  }\n  .years-mini .pill { font-weight: 700; }\n\n  /* EMI cards */\n  .emi-grid {\n    display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 10px;\n  }\n  @media (max-width: 760px) { .emi-grid { grid-template-columns: 1fr; } }\n  .emi-card {\n    padding: 16px;\n    border-radius: 14px;\n    background: var(--bg-2);\n    border: 1px solid var(--line);\n    text-align: center;\n  }\n  html[data-theme=\"light\"] .emi-card { background: #fff; }\n  .emi-card .label-top {\n    font-family: \"Yatra One\", serif;\n    color: var(--gold);\n    font-size: 18px;\n    margin-bottom: 8px;\n  }\n  .emi-card .emi-val {\n    font-family: \"Yatra One\", serif;\n    font-size: 30px;\n    color: var(--text);\n    line-height: 1.1;\n  }\n  .emi-card .row-mini { display: flex; justify-content: space-between; margin-top: 8px; color: var(--text-dim); font-size: 12.5px; }\n  .emi-card .row-mini b { color: var(--text); font-family: \"JetBrains Mono\", monospace; }\n  .emi-card.high { border-color: rgba(231,76,60,0.5); box-shadow: 0 0 0 1px rgba(231,76,60,0.3); }\n  .emi-card.high .emi-val { color: var(--danger); }\n  .emi-footer {\n    margin-top: 12px;\n    padding: 10px 12px;\n    background: rgba(231,76,60,0.08);\n    border: 1px dashed rgba(231,76,60,0.35);\n    border-radius: 10px;\n    color: var(--text-dim);\n    font-size: 13px;\n  }\n  .emi-footer b { color: var(--text); }\n\n  /* Leaderboard */\n  .lb-row {\n    display: grid; grid-template-columns: 28px 1fr 80px;\n    align-items: center; gap: 10px;\n    margin-bottom: 8px;\n  }\n  .lb-rank {\n    font-family: \"JetBrains Mono\", monospace;\n    font-size: 13px; color: var(--text-mute);\n    text-align: right;\n  }\n  .lb-bar-wrap {\n    display: flex; align-items: center; gap: 10px;\n    background: var(--bg-2);\n    border: 1px solid var(--line);\n    border-radius: 999px;\n    padding: 4px 12px 4px 6px;\n    height: 36px;\n    overflow: hidden;\n    position: relative;\n  }\n  html[data-theme=\"light\"] .lb-bar-wrap { background: #fff; }\n  .lb-bar {\n    height: 26px;\n    border-radius: 999px;\n    background: linear-gradient(90deg, var(--maroon), var(--saffron));\n    min-width: 6px;\n    transition: width 1s cubic-bezier(0.22, 1, 0.36, 1);\n  }\n  .lb-row.user .lb-bar { background: linear-gradient(90deg, var(--gold-2), var(--gold)); box-shadow: 0 0 0 1px var(--gold), 0 0 20px rgba(212,175,55,0.5); }\n  .lb-row.user .lb-bar-wrap { border-color: var(--gold); }\n  .lb-name {\n    font-weight: 700; color: var(--text);\n    flex-shrink: 0;\n    font-size: 13.5px;\n  }\n  .lb-here {\n    font-size: 11px;\n    color: var(--gold-2);\n    background: rgba(212,175,55,0.15);\n    padding: 2px 8px;\n    border-radius: 999px;\n    margin-left: auto;\n    font-weight: 700;\n  }\n  .lb-val { font-family: \"JetBrains Mono\", monospace; font-size: 13px; color: var(--gold); text-align: right; }\n\n  /* Compare tab */\n  .compare-grid {\n    display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 16px;\n  }\n  @media (max-width: 760px) { .compare-grid { grid-template-columns: 1fr; } }\n  .compare-col {\n    background: var(--bg-2);\n    border: 1px solid var(--line);\n    border-radius: var(--radius);\n    padding: 14px;\n  }\n  html[data-theme=\"light\"] .compare-col { background: #fff; }\n  .compare-col h3 {\n    font-family: \"Yatra One\", serif;\n    color: var(--gold);\n    margin: 0 0 12px;\n    font-size: 20px;\n    text-align: center;\n    padding: 8px 14px;\n    background: rgba(212,175,55,0.1);\n    border-radius: 10px;\n  }\n  .compare-col .field { background: var(--surface); }\n  .compare-col-a h3 { color: var(--saffron-2); background: rgba(255,107,0,0.12); }\n  .compare-col-b h3 { color: var(--gold-2); background: rgba(212,175,55,0.12); }\n  .compare-results { display: none; margin-top: 18px; }\n  .compare-results.show { display: block; animation: slideUp 0.5s; }\n  .compare-vs {\n    display: grid; grid-template-columns: 1fr 80px 1fr; align-items: center; gap: 12px;\n    padding: 22px;\n    background: var(--surface);\n    border: 1px solid var(--line);\n    border-radius: var(--radius-lg);\n  }\n  @media (max-width: 640px) { .compare-vs { grid-template-columns: 1fr; gap: 18px; } }\n  .compare-vs .col-result {\n    text-align: center;\n  }\n  .compare-vs .col-result .amt {\n    font-family: \"Yatra One\", serif;\n    font-size: clamp(34px, 6vw, 54px);\n    color: var(--text);\n    line-height: 1;\n  }\n  .compare-vs .col-result .who { font-size: 13px; color: var(--text-dim); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 6px; }\n  .compare-vs .col-result.winner .amt { color: var(--success); text-shadow: 0 0 20px rgba(46,204,113,0.3); }\n  .compare-vs .col-result.loser .amt { color: var(--danger); }\n  .vs-badge {\n    text-align: center;\n    font-family: \"Yatra One\", serif;\n    font-size: 32px;\n    color: var(--gold);\n    background: rgba(212,175,55,0.12);\n    border: 2px solid var(--line-strong);\n    border-radius: 50%;\n    width: 80px; height: 80px;\n    display: flex; align-items: center; justify-content: center;\n    margin: 0 auto;\n    box-shadow: 0 0 30px rgba(212,175,55,0.3);\n  }\n  .compare-saves {\n    text-align: center;\n    color: var(--gold-2);\n    font-weight: 700;\n    margin-top: 14px;\n    padding: 12px;\n    background: rgba(46,204,113,0.08);\n    border: 1px dashed rgba(46,204,113,0.4);\n    border-radius: 10px;\n  }\n  .compare-verdict {\n    margin-top: 12px;\n    text-align: center;\n    color: var(--text-dim);\n    font-style: italic;\n    font-size: 13.5px;\n    padding: 0 12px;\n  }\n\n  /* Receipt (hidden, used for export) */\n  .receipt-staging {\n    position: fixed; left: -10000px; top: 0;\n    width: 720px;\n    background: #fff;\n    color: #111;\n    padding: 40px 44px;\n    font-family: \"Georgia\", \"Times New Roman\", serif;\n    box-sizing: border-box;\n  }\n  .receipt-staging .r-header {\n    text-align: center;\n    border-bottom: 3px double #8B0000;\n    padding-bottom: 14px;\n  }\n  .receipt-staging .r-title {\n    font-family: \"Yatra One\", serif;\n    font-size: 36px;\n    color: #8B0000;\n    letter-spacing: 0.06em;\n    margin: 0;\n  }\n  .receipt-staging .r-sub {\n    color: #8B0000;\n    font-weight: bold;\n    font-size: 12px;\n    margin-top: 6px;\n    letter-spacing: 0.18em;\n  }\n  .receipt-staging .r-meta {\n    display: flex; justify-content: space-between; flex-wrap: wrap;\n    font-size: 13px; color: #333; margin: 14px 0 4px;\n  }\n  .receipt-staging .r-section {\n    margin-top: 18px;\n    border-top: 1px solid #ddd;\n    padding-top: 12px;\n  }\n  .receipt-staging .r-section h3 {\n    font-size: 13px;\n    text-transform: uppercase;\n    letter-spacing: 0.16em;\n    color: #8B0000;\n    margin: 0 0 8px;\n  }\n  .receipt-staging .r-line {\n    display: flex; justify-content: space-between;\n    padding: 6px 0;\n    border-bottom: 1px dotted #ccc;\n    font-size: 14px;\n  }\n  .receipt-staging .r-line.total {\n    border-top: 2px solid #111; border-bottom: 4px double #111;\n    padding-top: 10px; padding-bottom: 10px; margin-top: 10px;\n    font-weight: bold; font-size: 20px;\n    color: #8B0000;\n  }\n  .receipt-staging .r-line .desc { color: #333; }\n  .receipt-staging .r-line .amt { font-family: \"Courier New\", monospace; font-weight: bold; color: #111; }\n  .receipt-staging .r-disclaim {\n    margin-top: 20px;\n    padding: 12px;\n    border: 2px dashed #8B0000;\n    color: #8B0000;\n    font-size: 12.5px;\n    text-align: center;\n    line-height: 1.5;\n  }\n  .receipt-staging .r-watermark {\n    position: absolute;\n    top: 50%; left: 50%;\n    transform: translate(-50%, -50%) rotate(-28deg);\n    font-family: \"Yatra One\", serif;\n    font-size: 110px;\n    color: rgba(231,76,60,0.14);\n    pointer-events: none;\n    white-space: nowrap;\n    letter-spacing: 0.08em;\n    z-index: 1;\n  }\n  .receipt-staging .r-content { position: relative; z-index: 2; }\n  .receipt-staging .r-foot {\n    margin-top: 14px;\n    text-align: center;\n    color: #666;\n    font-size: 11px;\n    border-top: 1px solid #ddd;\n    padding-top: 10px;\n  }\n\n  /* Confetti */\n  .confetti {\n    position: fixed; pointer-events: none; inset: 0;\n    overflow: hidden; z-index: 200;\n  }\n  .confetti span {\n    position: absolute; top: -20px;\n    width: 10px; height: 14px;\n    background: var(--gold);\n    opacity: 0.9;\n    animation: confettiFall linear forwards;\n  }\n  @keyframes confettiFall {\n    0% { transform: translateY(0) rotate(0deg); }\n    100% { transform: translateY(110vh) rotate(720deg); }\n  }\n\n  /* Dollar mode badge */\n  .dollar-mode {\n    display: none;\n    margin-top: 14px;\n    text-align: center;\n    padding: 14px;\n    border-radius: 12px;\n    background: linear-gradient(135deg, #013220, #2ECC71 200%);\n    color: #d8ffe6;\n    border: 1px solid rgba(46,204,113,0.4);\n    font-weight: 700;\n    letter-spacing: 0.02em;\n  }\n  .dollar-mode.show { display: block; animation: slideDown 0.4s; }\n  .dollar-mode .globe { display: inline-block; animation: spin 4s linear infinite; }\n  @keyframes spin { to { transform: rotate(360deg); } }\n\n  /* CTA pulse */\n  .cta-pulse {\n    color: var(--gold-2);\n    font-weight: 700;\n    text-transform: uppercase;\n    letter-spacing: 0.16em;\n    font-size: 12px;\n    margin-top: 6px;\n  }\n\n  /* Disclaimer top */\n  .disclaimer-top {\n    margin-top: 12px;\n    padding: 10px 12px;\n    background: rgba(231,76,60,0.08);\n    border: 1px solid rgba(231,76,60,0.25);\n    border-radius: 10px;\n    color: var(--text-dim);\n    font-size: 12.5px;\n    text-align: center;\n  }\n  .disclaimer-top strong { color: #ff8d83; }\n\n  .panel {\n    margin-top: 24px;\n    padding: 22px;\n    background: var(--surface);\n    border-radius: var(--radius-lg);\n    border: 1px solid var(--line);\n    box-shadow: var(--shadow-soft);\n  }\n  .panel h2 {\n    font-family: \"Yatra One\", serif;\n    margin: 0 0 4px;\n    color: var(--gold-2);\n    font-size: clamp(22px, 3vw, 28px);\n  }\n  .panel .sub {\n    color: var(--text-dim);\n    font-size: 13.5px;\n    margin-bottom: 6px;\n  }\n\n  /* Animated rupee floaters */\n  .rupee-rain {\n    position: absolute; inset: 0; pointer-events: none; overflow: hidden;\n  }\n  .rupee-rain span {\n    position: absolute;\n    color: rgba(212,175,55,0.18);\n    font-family: \"Yatra One\", serif;\n    font-size: 22px;\n    animation: rupeeFloat 14s linear infinite;\n  }\n  @keyframes rupeeFloat {\n    0% { transform: translateY(110%) rotate(0deg); }\n    100% { transform: translateY(-110%) rotate(360deg); }\n  }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<!-- Top stats ticker -->\n<div class=\"stats-ticker\" aria-label=\"dowry statistics ticker\">\n  <div class=\"ticker-track\" id=\"topTicker\"><\u002Fdiv>\n<\u002Fdiv>\n\n<div class=\"container\">\n\n  <!-- HERO -->\n  <header class=\"hero\">\n    <div class=\"rupee-rain\" id=\"rupeeRain\"><\u002Fdiv>\n    <span class=\"lang-chip deva\">दहेज<\u002Fspan>\n    <button class=\"theme-toggle\" id=\"themeToggle\" aria-label=\"Toggle theme\">\n      <span id=\"themeIcon\">🌙<\u002Fspan><span id=\"themeLabel\">Dark<\u002Fspan>\n    <\u002Fbutton>\n    <div class=\"hindi deva\">दहेज कैलकुलेटर<\u002Fdiv>\n    <h1>DAHEJ CALCULATOR <span class=\"emoji\">💰<\u002Fspan><\u002Fh1>\n    <div class=\"tagline\">India's Most Accurate <em style=\"color:var(--saffron-2)\">(and Most Illegal)<\u002Fem> Calculator<\u002Fdiv>\n    <div class=\"subtext\">\n      Dowry is illegal under the <strong style=\"color:var(--gold)\">Dowry Prohibition Act, 1961<\u002Fstrong>. This tool exists to mock that reality — not endorse it.\n    <\u002Fdiv>\n    <div class=\"meta-row\">\n      <span class=\"pill\"><span class=\"dot\"><\u002Fspan>1,247 sample data points<\u002Fspan>\n      <span class=\"pill\"><span class=\"dot\"><\u002Fspan>37 states / UTs<\u002Fspan>\n      <span class=\"pill\"><span class=\"dot\"><\u002Fspan>43 professions<\u002Fspan>\n      <span class=\"pill\"><span class=\"dot\"><\u002Fspan>satire mode: ON<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <!-- TABS -->\n  <div class=\"panel\">\n    <div class=\"tabs\" role=\"tablist\">\n      <button class=\"tab-btn\" role=\"tab\" aria-selected=\"true\" data-tab=\"groom\">🤵 Groom's Market Value<\u002Fbutton>\n      <button class=\"tab-btn\" role=\"tab\" aria-selected=\"false\" data-tab=\"bride\">👰 Bride's Discount Calculator<\u002Fbutton>\n      <button class=\"tab-btn\" role=\"tab\" aria-selected=\"false\" data-tab=\"compare\">⚖️ Compare Two Grooms<\u002Fbutton>\n    <\u002Fdiv>\n\n    <!-- Groom panel -->\n    <section id=\"tab-groom\" data-tab-panel=\"groom\" style=\"margin-top: 18px;\">\n      <h2>Estimate the going rate<\u002Fh2>\n      <div class=\"sub\">Fill it in like you'd fill a matrimonial profile. We'll tell you what aunties already calculated in their heads.<\u002Fdiv>\n\n      <div class=\"form-grid\">\n        <div class=\"field\">\n          <div class=\"field-label\">🗺️ State <span class=\"tip\">Local market matters<\u002Fspan><\u002Fdiv>\n          <select class=\"input\" id=\"g_state\"><\u002Fselect>\n          <div class=\"field-tooltip\">Haryana, Bihar, UP, and Punjab top the charts. Northeast states are often the lowest — many are matrilineal.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"field\">\n          <div class=\"field-label\">💼 Profession <span class=\"tip\">Tier matters more than money<\u002Fspan><\u002Fdiv>\n          <select class=\"input\" id=\"g_prof\"><\u002Fselect>\n          <div class=\"field-tooltip\">An IAS officer outranks a CEO. A government peon outranks a private sector manager. This is rural India's economics.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"field\">\n          <div class=\"field-label\">🎓 Education<\u002Fdiv>\n          <select class=\"input\" id=\"g_edu\"><\u002Fselect>\n          <div class=\"field-tooltip\">IIT/IIM tags carry a separate premium. \"Foreign return\" is its own tier.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"field\">\n          <div class=\"field-label\">🕌 Caste / Religion <span class=\"tip\">We know. We hate it too.<\u002Fspan><\u002Fdiv>\n          <select class=\"input\" id=\"g_caste\"><\u002Fselect>\n          <div class=\"field-tooltip\">Studies show Brahmins and certain trading castes are highest payers. We're not making this up.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"field\">\n          <div class=\"field-label\">🏦 Monthly Income<\u002Fdiv>\n          <div class=\"slider-wrap\">\n            <div class=\"slider-row\">\n              <span class=\"slider-value\" id=\"g_income_label\">₹50,000 / mo<\u002Fspan>\n              <span class=\"slider-band\" id=\"g_income_band\">Middle class<\u002Fspan>\n            <\u002Fdiv>\n            <input type=\"range\" id=\"g_income\" min=\"0\" max=\"6\" step=\"1\" value=\"2\">\n          <\u002Fdiv>\n          <div class=\"field-tooltip\">Slides snap to 7 salary bands: ₹0 / ₹25K / ₹50K / ₹1L / ₹2L / ₹5L / ₹10L+ monthly.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"field\">\n          <div class=\"field-label\">👴 Age<\u002Fdiv>\n          <div class=\"slider-wrap\">\n            <div class=\"slider-row\">\n              <span class=\"slider-value\" id=\"g_age_label\">28<\u002Fspan>\n              <span class=\"slider-band\" id=\"g_age_band\">Prime age<\u002Fspan>\n            <\u002Fdiv>\n            <input type=\"range\" id=\"g_age\" min=\"21\" max=\"55\" step=\"1\" value=\"28\">\n          <\u002Fdiv>\n          <div class=\"field-tooltip\">Peak market value: 29-32. After 38, value drops sharply.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"field\">\n          <div class=\"field-label\">🏙️ Location<\u002Fdiv>\n          <div class=\"pill-toggle\" id=\"g_loc\">\n            <button data-loc=\"metro\" aria-pressed=\"true\">Metro<\u002Fbutton>\n            <button data-loc=\"tier1\" aria-pressed=\"false\">Tier-1<\u002Fbutton>\n            <button data-loc=\"tier2\" aria-pressed=\"false\">Tier-2<\u002Fbutton>\n            <button data-loc=\"rural\" aria-pressed=\"false\">Rural<\u002Fbutton>\n          <\u002Fdiv>\n          <div class=\"field-tooltip\">Metros: cash. Rural: cash + land + gold + tractor + 2-wheeler.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"field\">\n          <div class=\"field-label\">💎 Family Wealth<\u002Fdiv>\n          <select class=\"input\" id=\"g_wealth\">\n            <option value=\"0.85\">Modest (under ₹50L)<\u002Foption>\n            <option value=\"1.0\" selected=\"\">Middle class (₹50L–2Cr)<\u002Foption>\n            <option value=\"1.18\">Upper middle (₹2–10Cr)<\u002Foption>\n            <option value=\"1.4\">Wealthy (₹10–50Cr)<\u002Foption>\n            <option value=\"1.75\">Ultra HNI (₹50Cr+)<\u002Foption>\n          <\u002Fselect>\n          <div class=\"field-tooltip\">Wealthier families \"expect more\" because they \"have more to maintain.\"<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"field full\">\n          <div class=\"field-label\">🌾 Groom's Family Land<\u002Fdiv>\n          <div style=\"color: var(--text-dim); font-size: 12.5px; margin: -4px 0 8px;\">Agricultural land is a core dowry component in Bihar, UP, Haryana, Punjab.<\u002Fdiv>\n          <div class=\"land-input-row\">\n            <select class=\"input land-dd\" id=\"g_land_dd\"><\u002Fselect>\n            <input type=\"number\" class=\"input land-num\" id=\"g_land_num\" placeholder=\"or type exact acres\" min=\"0\" max=\"9999\" step=\"0.5\">\n          <\u002Fdiv>\n          <input type=\"hidden\" id=\"g_land\" value=\"0\" data-acres=\"0\" data-value=\"0\">\n          <div class=\"land-value-hint\" id=\"g_land_hint\">Select state first to see land value<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"field full\">\n          <div class=\"field-label\">⚙️ Extras<\u002Fdiv>\n          <div class=\"checks\">\n            <label class=\"check\">\n              <input type=\"checkbox\" id=\"g_nri\">\n              <span class=\"box\">✓<\u002Fspan>\n              <span class=\"label\">NRI Groom<\u002Fspan>\n              <span class=\"meta\">unlocks country<\u002Fspan>\n            <\u002Flabel>\n            <div class=\"conditional\" id=\"g_nri_wrap\">\n              <select class=\"input\" id=\"g_nri_country\">\n                <option value=\"2.5\">🇺🇸 USA — Green Card<\u002Foption>\n                <option value=\"1.8\">🇺🇸 USA — H1B<\u002Foption>\n                <option value=\"1.6\">🇬🇧 UK<\u002Foption>\n                <option value=\"1.6\">🇨🇦 Canada (PR)<\u002Foption>\n                <option value=\"1.3\">🇦🇪 Gulf<\u002Foption>\n                <option value=\"1.5\">🇦🇺 Australia (PR)<\u002Foption>\n              <\u002Fselect>\n            <\u002Fdiv>\n            <label class=\"check\">\n              <input type=\"checkbox\" id=\"g_only\">\n              <span class=\"box\">✓<\u002Fspan>\n              <span class=\"label\">Only Child<\u002Fspan>\n              <span class=\"meta\">+ inheritance angle<\u002Fspan>\n            <\u002Flabel>\n            <label class=\"check\">\n              <input type=\"checkbox\" id=\"g_div\">\n              <span class=\"box\">✓<\u002Fspan>\n              <span class=\"label\">Divorced / Widowed<\u002Fspan>\n              <span class=\"meta\">market value drop<\u002Fspan>\n            <\u002Flabel>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"notice\" id=\"g_notice\"><\u002Fdiv>\n      <div class=\"dollar-mode\" id=\"dollarMode\"><span class=\"globe\">🌍<\u002Fspan> &nbsp; Dollar mode activated — converting demand to USD swagger<\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- Bride panel -->\n    <section id=\"tab-bride\" data-tab-panel=\"bride\" style=\"margin-top: 18px; display: none;\">\n      <h2>How much does she \"discount\" the demand?<\u002Fh2>\n      <div class=\"sub\">Cruel framing, real-life numbers. A working bride genuinely reduces dowry demand. Spoiler: it shouldn't have to.<\u002Fdiv>\n\n      <div class=\"form-grid\">\n        <div class=\"field\">\n          <div class=\"field-label\">🗺️ State<\u002Fdiv>\n          <select class=\"input\" id=\"b_state\"><\u002Fselect>\n        <\u002Fdiv>\n        <div class=\"field\">\n          <div class=\"field-label\">🎓 Education<\u002Fdiv>\n          <select class=\"input\" id=\"b_edu\"><\u002Fselect>\n          <div class=\"field-tooltip\">Higher education = larger discount on demanded dowry. Education shouldn't be a \"discount\" — but here we are.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"field\">\n          <div class=\"field-label\">🕌 Caste / Religion<\u002Fdiv>\n          <select class=\"input\" id=\"b_caste\"><\u002Fselect>\n        <\u002Fdiv>\n        <div class=\"field\">\n          <div class=\"field-label\">👰 Age<\u002Fdiv>\n          <div class=\"slider-wrap\">\n            <div class=\"slider-row\">\n              <span class=\"slider-value\" id=\"b_age_label\">26<\u002Fspan>\n              <span class=\"slider-band\" id=\"b_age_band\">Prime age<\u002Fspan>\n            <
