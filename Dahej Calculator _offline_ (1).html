\": 15, \"Uttar Pradesh\": 15,\n  \"Uttarakhand\": 15, \"Rajasthan\": 10, \"Madhya Pradesh\": 8,\n  \"Bihar\": 8, \"Jharkhand\": 5, \"Odisha\": 5,\n  \"Assam\": 4, \"Chhattisgarh\": 4,\n  \"Jammu & Kashmir\": 12, \"Ladakh\": 6, \"Sikkim\": 12,\n  \"Tripura\": 5, \"Manipur\": 6, \"Nagaland\": 5, \"Mizoram\": 5,\n  \"Meghalaya\": 4, \"Arunachal Pradesh\": 5, \"Puducherry\": 25,\n  \"Lakshadweep\": 30, \"Andaman & Nicobar\": 10,\n  \"Dadra & NH\": 18, \"Daman & Diu\": 18,\n  \"NRI / Outside India\": 0,\n  \"default\": 10\n};\nconst LAND_DROPDOWN_OPTIONS = [\n  { val: 0,    label: \"No land (0 acres)\" },\n  { val: 0.5,  label: \"0.5 acres (half bigha)\" },\n  { val: 1,    label: \"1 acre\" },\n  { val: 2,    label: \"2 acres\" },\n  { val: 3,    label: \"3 acres\" },\n  { val: 5,    label: \"5 acres\" },\n  { val: 8,    label: \"8 acres\" },\n  { val: 10,   label: \"10 acres\" },\n  { val: 15,   label: \"15 acres\" },\n  { val: 20,   label: \"20 acres\" },\n  { val: 30,   label: \"30 acres\" },\n  { val: 50,   label: \"50 acres\" },\n  { val: 100,  label: \"100 acres\" },\n  { val: -1,   label: \"100+ acres (enter manually →)\" }\n];\n\n// Gold rate (22k jewellery standard, May 2026)\nconst GOLD_RATE_PER_GRAM = 9200;\n\n// Property ₹ per sq ft\nconst PROPERTY_PRICES = {\n  metro:    { name: \"Mumbai\",     ppsf: 25000 },\n  metro2:   { name: \"Bangalore\",  ppsf: 12000 },\n  tier1:    { name: \"Pune\",       ppsf: 8500  },\n  tier2:    { name: \"Jaipur\",     ppsf: 4500  },\n  rural:    { name: \"Rural plot\", ppsf: 1500  }\n};\nfunction bhkLabel(sqft) {\n  if (sqft < 400) return \"studio\";\n  if (sqft < 700) return \"1 BHK\";\n  if (sqft < 1100) return \"2 BHK\";\n  if (sqft < 1600) return \"3 BHK\";\n  if (sqft < 2400) return \"4 BHK\";\n  return \"luxury villa\";\n}\n\nconst APPLIANCES = [\n  [\"Double Door Fridge (Samsung/LG)\", 45000],\n  [\"Front Load Washing Machine\",      35000],\n  [\"Split AC (1.5 ton) × 2 units\",    70000],\n  [\"55-inch LED Smart TV (Samsung)\",  55000],\n  [\"Sofa Set (L-shaped)\",             40000],\n  [\"King Size Bed + Mattress\",        45000],\n  [\"Dining Table (6-seater)\",         25000],\n  [\"Microwave + OTG\",                 15000],\n  [\"Mixer Grinder + Induction\",        8000],\n  [\"Geyser × 2\",                      10000],\n  [\"Ceiling Fans × 5\",                10000],\n  [\"RO Water Purifier\",               12000],\n  [\"Laptop (Mid-range)\",              60000],\n  [\"Motorcycle (Honda Activa)\",       85000]\n];\n\nconst AUNTY_QUOTES = [\n  \"Itna? Woh toh denge hi. Doctor hai unka beta!\",\n  \"Thoda aur maango... IIT se hai, sharam kyun?\",\n  \"Aaj kal ki ladkiyan naukri karti hain toh demand kam hoti hai — galat baat hai!\",\n  \"Mere zamaane mein toh isse bhi zyada diya tha, aur khushi se diya tha.\",\n  \"Ek baar le lo, phir puri zindagi set hai unka.\",\n  \"Hum log toh simple family hain, sirf ₹50 lakh maange hain.\",\n  \"Ladka IAS hai, ladka IAS hai! Sone se nahi tolenaa chahiye!\",\n  \"Beta, investment samjho ise. Rishta set ho jayega.\",\n  \"Woh toh kuch bhi nahi maang rahe, bahut simple log hain.\",\n  \"Humari beti ne naukri chhodi toh demand badhegi hi na?\",\n  \"Arey, ladke waale toh bahut seedhe hain — sirf ek gaadi aur thoda cash.\",\n  \"Yeh calculator bilkul sahi keh raha hai. Meri didi ne bhi itna hi diya.\",\n  \"Sharma ji ke ladke ne sirf ₹80 lakh liye. Itne mein toh kya hoga?\",\n  \"Ek baar dene ke baad beti ka ghar set ho jaata hai.\",\n  \"Tum log toh lucky ho — woh gold nahi maang rahe, bas cash.\"\n];\n\n// Car tiers (2026 on-road approximate ₹ Lakhs): [maxLakhs, emoji, name, tagline, samplePriceLakhs]\nconst CAR_TIERS = [\n  [4,    \"🚗\", \"Maruti Alto K10 / Tata Tiago\",          \"Beta, walk karo.\",                       4],\n  [8,    \"🚗\", \"Maruti Swift / Hyundai Grand i10\",       \"Entry level pride.\",                     7],\n  [12,   \"🚗\", \"Hyundai i20 / Maruti Baleno\",            \"Middle class comfort.\",                  11],\n  [20,   \"🚙\", \"Hyundai Creta / Kia Seltos\",             \"Respectable SUV territory.\",             18],\n  [32,   \"🚙\", \"Toyota Innova Crysta / MG Hector\",       \"Big family arrived.\",                    27],\n  [48,   \"🛻\", \"Toyota Fortuner / Jeep Meridian\",        \"You've arrived. Barely.\",                42],\n  [70,   \"🚘\", \"Mercedes C-Class / BMW 3 Series\",        \"Shaadi ya showroom?\",                    62],\n  [120,  \"🚘\", \"Mercedes E-Class / Audi A6\",             \"Beta, yeh toh zyada ho gaya.\",           95],\n  [250,  \"🏎️\", \"Range Rover Sport / Porsche Cayenne\",   \"Illegal demand, luxury taste.\",          180],\n  [99999,\"🚀\", \"Rolls Royce Ghost / Lamborghini Urus\",   \"Sir, yeh toh FIR hai.\",                  500]\n];\n\n// Wedding tiers\nconst WEDDING_TIERS = [\n  [2,    \"🏛️\", \"Court Marriage + Ghar ka khana\", \"50 people, biryani banegi, family group mein announcement.\"],\n  [5,    \"🏡\", \"Simple Home Wedding\",            \"100 guests, 1 function, local caterer, no DJ.\"],\n  [15,   \"🎪\", \"Standard Shaadi\",                \"300 guests, tent house, DJ, mehendi + sangeet + wedding.\"],\n  [30,   \"💒\", \"Proper Shaadi\",                  \"500 guests, farmhouse venue, baraat, 4 functions, live band.\"],\n  [75,   \"👑\", \"Premium Shaadi\",                 \"800+ guests, 5-star hotel, destination entry, drone photography.\"],\n  [200,  \"🏰\", \"Grand Royal Shaadi\",             \"1000+ guests, Rajasthan fort/palace venue, celebrity performance.\"],\n  [99999,\"✈️\", \"Ambani-lite Destination Wedding\",\"Udaipur palace, international guests, chartered flights — and somehow YOU'RE paying.\"]\n];\n\n// Leaderboard (base rates in lakhs, pre-multiplier — May 2026)\nconst LEADERBOARD = [\n  [\"Uttar Pradesh\", 25],\n  [\"Bihar\", 22],\n  [\"Haryana\", 20],\n  [\"Andhra Pradesh\", 18],\n  [\"Telangana\", 16],\n  [\"Kerala\", 14],\n  [\"Punjab\", 13],\n  [\"Rajasthan\", 13],\n  [\"Madhya Pradesh\", 11],\n  [\"Delhi\", 10]\n];\n\nconst $ = (id) => document.getElementById(id);\nconst fmtLakh = (lakhs) => {\n  // input is number in lakhs; format like Indian currency\n  const r = Math.round(lakhs * 100000);\n  // To Indian numbering: ₹X.XX Cr / ₹Y.YY L\n  if (r >= 1_00_00_000) return (r / 1_00_00_000).toFixed(2).replace(/\\.00$/, \"\") + \" Cr\";\n  if (r >= 1_00_000)   return (r / 1_00_000).toFixed(2).replace(/\\.00$/, \"\") + \" L\";\n  return r.toLocaleString(\"en-IN\");\n};\nconst fmtRupees = (lakhs) => {\n  const r = Math.round(lakhs * 100000);\n  return r.toLocaleString(\"en-IN\");\n};\nconst fmtUSD = (lakhs) => {\n  const usd = Math.round(lakhs * 100000 / 84);\n  return \"$\" + usd.toLocaleString(\"en-US\");\n};\nconst pick = (arr) => arr[Math.floor(Math.random() * arr.length)];\n\n/* ============================================================\n   DOM POPULATION\n   ============================================================ */\nfunction buildOption(text, value, tier) {\n  const opt = document.createElement(\"option\");\n  opt.textContent = text;\n  opt.value = value;\n  if (tier) opt.dataset.tier = tier;\n  return opt;\n}\n\n// states\n[$(\"g_state\"), $(\"b_state\")].forEach(sel => {\n  STATES.forEach((s, i) => {\n    const opt = buildOption(`${s[2]}  ${s[0]}`, i);\n    sel.appendChild(opt);\n  });\n});\n$(\"g_state\").value = 11;\n$(\"b_state\").value = 11;\n\n// professions (groom)\nPROFESSIONS.forEach((p, i) => {\n  const opt = buildOption(`${p[0]}    [${p[1] === \"SP\" ? \"S+\" : p[1]}]`, i);\n  opt.dataset.tier = p[1];\n  $(\"g_prof\").appendChild(opt);\n});\n$(\"g_prof\").value = 9; // FAANG / Top MNC default\n\n// professions (bride)\nBRIDE_PROFESSIONS.forEach((p, i) => {\n  const opt = buildOption(p[0], i);\n  $(\"b_prof\").appendChild(opt);\n});\n$(\"b_prof\").value = 3; // FAANG default\n\n// education\nEDUCATION.forEach((e, i) => $(\"g_edu\").appendChild(buildOption(e[0], i)));\n$(\"g_edu\").value = 0; // IIT/IISc/IIM default\nBRIDE_EDUCATION.forEach((e, i) => $(\"b_edu\").appendChild(buildOption(e[0], i)));\n$(\"b_edu\").value = 6; // Engineering (Any) default\n\n// caste\nCASTES.forEach((c, i) => {\n  $(\"g_caste\").appendChild(buildOption(c[0], i));\n  $(\"b_caste\").appendChild(buildOption(c[0], i));\n});\n$(\"g_caste\").value = 5; // Brahmin (Upper) default\n$(\"b_caste\").value = 5;\n\n// Ticker\nfunction buildTicker(id, items, copies = 3) {\n  const el = $(id);\n  let html = \"\";\n  for (let i = 0; i < copies; i++) {\n    items.forEach(it => {\n      html += `<span class=\"ticker-item\"><span class=\"ticker-dot\"><\u002Fspan>${it}<\u002Fspan>`;\n    });\n  }\n  el.innerHTML = html;\n}\nbuildTicker(\"topTicker\", TICKER_TOP, 4);\n\n// facts ticker\nconst ft = $(\"factsTrack\");\nlet factsHtml = \"\";\nfor (let i = 0; i < 3; i++) {\n  FACTS.forEach(f => factsHtml += `<span>${f}<\u002Fspan>`);\n}\nft.innerHTML = factsHtml;\n\n// Rupee rain\nconst rr = $(\"rupeeRain\");\nfor (let i = 0; i < 12; i++) {\n  const s = document.createElement(\"span\");\n  s.textContent = \"₹\";\n  s.style.left = Math.random() * 100 + \"%\";\n  s.style.animationDelay = (-Math.random() * 14) + \"s\";\n  s.style.animationDuration = (8 + Math.random() * 10) + \"s\";\n  s.style.fontSize = (14 + Math.random() * 22) + \"px\";\n  rr.appendChild(s);\n}\n\n/* ============================================================\n   INTERACTIONS\n   ============================================================ */\n// Tabs\ndocument.querySelectorAll(\".tab-btn\").forEach(btn => {\n  btn.addEventListener(\"click\", () => {\n    const tab = btn.dataset.tab;\n    document.querySelectorAll(\".tab-btn\").forEach(b => b.setAttribute(\"aria-selected\", b === btn));\n    document.querySelectorAll(\"[data-tab-panel]\").forEach(p => {\n      p.style.display = p.dataset.tabPanel === tab ? \"block\" : \"none\";\n    });\n    // Hide main calculate button + disclaimer on compare tab (compare has its own button)\n    $(\"calcBtn\").style.display = tab === \"compare\" ? \"none\" : \"\";\n    document.querySelector(\".disclaimer-top\").style.display = tab === \"compare\" ? \"none\" : \"\";\n  });\n});\n\n// Income slider (groom)\nconst gIncome = $(\"g_income\");\nfunction updateIncome() {\n  const v = +gIncome.value;\n  const band = INCOME_BANDS[v];\n  $(\"g_income_label\").textContent = band[0];   // short monthly (e.g. \"₹2L–4L/mo\")\n  $(\"g_income_band\").textContent  = band[1];   // annual label (e.g. \"₹25L–₹50L/yr\")\n  gIncome.style.setProperty(\"--p\", (v / 6 * 100) + \"%\");\n}\ngIncome.addEventListener(\"input\", updateIncome);\nupdateIncome();\n\n// Land inputs (dropdown + manual override)\nfunction landPriceForState(stateName) {\n  return LAND_PRICES[stateName] != null ? LAND_PRICES[stateName] : LAND_PRICES.default;\n}\nfunction setupLand(ddId, numId, hiddenId, hintId, stateSelectId) {\n  const dd = $(ddId), num = $(numId), hidden = $(hiddenId), hint = $(hintId);\n  // Populate dropdown\n  dd.innerHTML = \"\";\n  LAND_DROPDOWN_OPTIONS.forEach((o, i) => {\n    const opt = document.createElement(\"option\");\n    opt.value = i;\n    opt.textContent = o.label;\n    dd.appendChild(opt);\n  });\n\n  function update(acres) {\n    if (!isFinite(acres) || acres < 0) acres = 0;\n    const stateIdx = +$(stateSelectId).value;\n    const stateName = STATES[stateIdx] ? STATES[stateIdx][0] : null;\n    const pricePerAcre = stateName ? landPriceForState(stateName) : 0;\n    const valueLakhs = acres * pricePerAcre;\n    hidden.dataset.acres = acres;\n    hidden.dataset.value = valueLakhs;\n    if (!stateName) {\n      hint.innerHTML = \"Select state first to see land value\";\n    } else if (acres === 0) {\n      hint.innerHTML = `No land — pure cash + saman demand.`;\n    } else {\n      const acreLabel = acres === 1 ? \"1 acre\" : (acres < 1 ? `${acres} acre` : `${acres} acres`);\n      hint.innerHTML = `🌾 <b>${acreLabel}<\u002Fb> × ₹${pricePerAcre}L/acre = <b>₹${fmtLakh(valueLakhs)}<\u002Fb> in ${stateName}`;\n    }\n  }\n\n  function syncDropdownFromAcres(acres) {\n    // Find exact match\n    let idx = LAND_DROPDOWN_OPTIONS.findIndex(o => o.val === acres);\n    if (idx === -1) {\n      // No exact match -> \"100+ acres (enter manually)\"\n      idx = LAND_DROPDOWN_OPTIONS.length - 1;\n    }\n    dd.value = idx;\n  }\n\n  dd.addEventListener(\"change\", () => {\n    const opt = LAND_DROPDOWN_OPTIONS[+dd.value];\n    if (opt.val === -1) {\n      // Manual mode — focus the number input\n      num.focus();\n      if (!num.value) num.value = 100;\n      update(parseFloat(num.value) || 0);\n    } else {\n      num.value = opt.val === 0 ? \"\" : opt.val;\n      update(opt.val);\n    }\n  });\n\n  num.addEventListener(\"input\", () => {\n    const acres = parseFloat(num.value);\n    if (!isFinite(acres)) {\n      update(0); return;\n    }\n    syncDropdownFromAcres(acres);\n    update(acres);\n  });\n\n  $(stateSelectId).addEventListener(\"change\", () => {\n    update(parseFloat(hidden.dataset.acres || \"0\"));\n  });\n\n  update(0);\n}\nsetupLand(\"g_land_dd\", \"g_land_num\", \"g_land\", \"g_land_hint\", \"g_state\");\nsetupLand(\"b_land_dd\", \"b_land_num\", \"b_land\", \"b_land_hint\", \"b_state\");\n\n// Age sliders\nfunction setupAge(id, labelId, bandId, gender, min) {\n  const el = $(id);\n  function up() {\n    const a = +el.value;\n    const [, label] = AGE_BRACKETS(a, gender);\n    $(labelId).textContent = a;\n    $(bandId).textContent = label;\n    el.style.setProperty(\"--p\", ((a - +el.min) / (+el.max - +el.min) * 100) + \"%\");\n  }\n  el.addEventListener(\"input\", up);\n  up();\n}\nsetupAge(\"g_age\", \"g_age_label\", \"g_age_band\", \"groom\");\nsetupAge(\"b_age\", \"b_age_label\", \"b_age_band\", \"bride\");\n\n// Location pill\nlet groomLoc = \"metro\";\n$(\"g_loc\").querySelectorAll(\"button\").forEach(btn => {\n  btn.addEventListener(\"click\", () => {\n    groomLoc = btn.dataset.loc;\n    $(\"g_loc\").querySelectorAll(\"button\").forEach(b => b.setAttribute(\"aria-pressed\", b === btn));\n  });\n});\n\n// Conditional checkbox sections\n$(\"g_nri\").addEventListener(\"change\", e => {\n  $(\"g_nri_wrap\").classList.toggle(\"active\", e.target.checked);\n  $(\"dollarMode\").classList.toggle(\"show\", e.target.checked);\n});\n$(\"b_working\").addEventListener(\"change\", e => {\n  $(\"b_work_wrap\").classList.toggle(\"active\", e.target.checked);\n});\n\n// Theme toggle\n$(\"themeToggle\").addEventListener(\"click\", () => {\n  const cur = document.documentElement.dataset.theme || \"dark\";\n  const next = cur === \"dark\" ? \"light\" : \"dark\";\n  document.documentElement.dataset.theme = next;\n  $(\"themeIcon\").textContent = next === \"dark\" ? \"🌙\" : \"☀️\";\n  $(\"themeLabel\").textContent = next === \"dark\" ? \"Dark\" : \"Light\";\n});\n\n// Special-state notice updates\nfunction checkNotices() {\n  // groom side\n  const stateIdx = +$(\"g_state\").value;\n  const casteIdx = +$(\"g_caste\").value;\n  const profIdx = +$(\"g_prof\").value;\n  const stateName = STATES[stateIdx][0];\n  const casteName = CASTES[casteIdx][0];\n  const profName = PROFESSIONS[profIdx][0];\n  const note = $(\"g_notice\");\n  let msg = \"\";\n  if (stateName === \"Meghalaya\") msg = `🎉  <strong>Matrilineal society alert:<\u002Fstrong> In Meghalaya, the groom's family traditionally pays. Flipping the calculation.`;\n  else if (casteName.startsWith(\"Muslim\")) msg = `🌙  <strong>Note:<\u002Fstrong> In Islam, <em>Mahr<\u002Fem> is paid by the GROOM to the bride. Calculating reverse-flow dynamics.`;\n  else if (casteName.startsWith(\"Buddhist\")) msg = `☸️  <strong>Note:<\u002Fstrong> Many Buddhist traditions don't include dowry. Some converted communities still do.`;\n  else if (profName === \"Unemployed\") msg = `🤔  <strong>Sir, are you sure?<\u002Fstrong> An unemployed groom may produce negative output. Aunty rejection guaranteed.`;\n  else if (profName === \"Farmer (subsistence)\") msg = `🌾  <strong>Note:<\u002Fstrong> Small farmers face their own crisis. Dowry pressures are still real here.`;\n  note.innerHTML = msg ? `<span class=\"icon\">${msg.match(/^[^<\\s]+/)?.[0] || \"ℹ️\"}<\u002Fspan><div>${msg.replace(/^[^<\\s]+\\s*/, \"\")}<\u002Fdiv>` : \"\";\n  note.classList.toggle(\"show\", !!msg);\n\n  // bride side\n  const bNote = $(\"b_notice\");\n  const bState = STATES[+$(\"b_state\").value][0];\n  const bCaste = CASTES[+$(\"b_caste\").value][0];\n  let bMsg = \"\";\n  if (bState === \"Meghalaya\") bMsg = `🎉  <strong>Matrilineal society:<\u002Fstrong> In Meghalaya, the bride's family is on the receiving end. Dowry math flips.`;\n  else if (bCaste.startsWith(\"Muslim\")) bMsg = `🌙  <strong>Mahr:<\u002Fstrong> In Islam, the groom pays the bride. This is the inverse of dowry, even if cultural dowry often persists in practice.`;\n  bNote.innerHTML = bMsg ? `<span class=\"icon\">${bMsg.match(/^[^<\\s]+/)?.[0]}<\u002Fspan><div>${bMsg.replace(/^[^<\\s]+\\s*/, \"\")}<\u002Fdiv>` : \"\";\n  bNote.classList.toggle(\"show\", !!bMsg);\n}\n[\"g_state\",\"g_caste\",\"g_prof\",\"b_state\",\"b_caste\"].forEach(id => $(id).addEventListener(\"change\", checkNotices));\ncheckNotices();\n\n/* ============================================================\n   CALCULATION\n   ============================================================ */\nfunction compute() {\n  const activeTab = document.querySelector(\".tab-btn[aria-selected='true']\").dataset.tab;\n\n  // ---- Read groom inputs (form the base demand) ----\n  const state  = STATES[+$(\"g_state\").value];          // [name, base, ...]\n  const prof   = PROFESSIONS[+$(\"g_prof\").value];      // [name, tier, multiplier]\n  const edu    = EDUCATION[+$(\"g_edu\").value];         // [name, bonus_pct]\n  const caste  = CASTES[+$(\"g_caste\").value];          // [name, multiplier, ...]\n  const incomeIdx = +$(\"g_income\").value;\n  const income = INCOME_BANDS[incomeIdx];              // [monthly, annual, adj_pct]\n  const age    = +$(\"g_age\").value;\n  const [ageAdjLakhs, ageLabel] = AGE_BRACKETS(age, \"groom\");  // flat lakh addition\n  const loc    = LOCATIONS[groomLoc];\n  const isNRI  = $(\"g_nri\").checked;\n  const nriMul = isNRI ? parseFloat($(\"g_nri_country\").value) : 1;\n  const isOnly = $(\"g_only\").checked;\n  const isDiv  = $(\"g_div\").checked;\n\n  // ---- Read land (acres + value in Lakhs) ----\n  const gAcres   = parseFloat($(\"g_land\").dataset.acres || \"0\");\n  const gLandVal = parseFloat($(\"g_land\").dataset.value || \"0\");  // lakhs\n  const bAcres   = parseFloat($(\"b_land\").dataset.acres || \"0\");\n  const bLandVal = parseFloat($(\"b_land\").dataset.value || \"0\");\n\n  // ============================================================\n  // STEPS 1-3: Core = State Base × Profession Multiplier\n  // ============================================================\n  let core = state[1] * prof[2];\n\n  // STEP 4: Education bonus (% of core)\n  core = core + (core * (edu[1] / 100));\n\n  // STEP 5: Income adjustment (% of core)\n  core = core + (core * (income[2] / 100));\n\n  // STEP 6: Age adjustment (flat lakh addition)\n  core = core + ageAdjLakhs;\n\n  // STEP 7: Caste multiplier\n  core = core * caste[1];\n\n  // STEP 8: Location multiplier\n  core = core * loc.mod;\n\n  // STEP 9: Land — groom's land added directly; bride's land 50% of value\n  core = core + gLandVal;\n  core = core + (bLandVal * 0.5);\n\n  // STEP 10: Bride discount (only when on bride tab AND working OR with education discount)\n  let brideDiscount = 0, brideProfName = null, brideEduName = null;\n  if (activeTab === \"bride\") {\n    const bEdu = BRIDE_EDUCATION[+$(\"b_edu\").value];  // [name, discount_pct]\n    brideEduName = bEdu[0];\n    brideDiscount += bEdu[1];\n    if ($(\"b_working\").checked) {\n      const bProf = BRIDE_PROFESSIONS[+$(\"b_prof\").value];  // [name, discount_pct]\n      brideProfName = bProf[0];\n      brideDiscount += bProf[1];\n      // ₹ income band as additional small discount (in pct)\n      brideDiscount += parseFloat($(\"b_income\").value);\n    }\n    if ($(\"b_only\").checked) brideDiscount += 6;\n    if ($(\"b_div\").checked)  brideDiscount -= 10;\n    // bride age modifier (kept as % from old logic)\n    const bAge = +$(\"b_age\").value;\n    const [bAgePct] = AGE_BRACKETS(bAge, \"bride\");\n    brideDiscount += (bAgePct / 2);\n    brideDiscount = Math.max(-30, Math.min(75, brideDiscount));  // hard cap 75% off\n    core = core * (1 - brideDiscount / 100);\n  }\n\n  // STEP 11: NRI premium\n  if (isNRI) core = core * nriMul;\n\n  // STEP 12: Extras\n  if (isOnly) core = core * 1.15;\n  if (isDiv)  core = core * 0.65;\n  // Family wealth (kept from existing form)\n  const wealthMul = parseFloat($(\"g_wealth\").value);\n  if (isFinite(wealthMul)) core = core * wealthMul;\n\n  // STEP 13: Round to nearest ₹50,000 (0.5L)\n  let final = Math.round(core * 20) / 20;\n  if (final < 0) final = 0;\n\n  const isMatrilineal = state[0] === \"Meghalaya\" || state[0] === \"Mizoram\" || state[0] === \"Lakshadweep\";\n  const isMahr = caste[0].startsWith(\"Muslim\") || caste[0].startsWith(\"Buddhist\");\n\n  // ---- Breakdown items (informative) ----\n  const items = [];\n  items.push({ key: \"state\",  ic: \"📍\", label: `State: ${state[0]}`,            value: `Base ₹${fmtLakh(state[1])}`,            cls: \"add\" });\n  items.push({ key: \"prof\",   ic: \"💼\", label: `Profession: ${prof[0]}`,        value: `× ${prof[2].toFixed(2)}`,                cls: \"mult\" });\n  items.push({ key: \"edu\",    ic: \"🎓\", label: `Education: ${edu[0]}`,          value: `${edu[1] >= 0 ? \"+\" : \"\"}${edu[1]}% of core`, cls: edu[1] >= 0 ? \"add\" : \"discount\" });\n  items.push({ key: \"income\", ic: \"🏦\", label: `Income: ${income[1]}`,          value: `${income[2] >= 0 ? \"+\" : \"\"}${income[2]}% of core`, cls: income[2] >= 0 ? \"add\" : \"discount\" });\n  items.push({ key: \"age\",    ic: \"👴\", label: `Age ${age}: ${ageLabel}`,        value: `${ageAdjLakhs >= 0 ? \"+\" : \"\"}₹${fmtLakh(Math.abs(ageAdjLakhs))}`, cls: ageAdjLakhs >= 0 ? \"add\" : \"discount\" });\n  items.push({ key: \"caste\",  ic: \"🕌\", label: `Caste: ${caste[0].split(\" (\")[0]}`, value: `× ${caste[1].toFixed(2)}`,           cls: \"mult\" });\n  items.push({ key: \"loc\",    ic: \"🏙️\", label: `Location: ${loc.label}`,        value: `× ${loc.mod.toFixed(2)}`,                cls: \"mult\" });\n  if (isNRI) items.push({ key: \"nri\",  ic: \"🌍\", label: `NRI premium`,           value: `× ${nriMul.toFixed(2)}`,                 cls: \"add\" });\n  if (isOnly) items.push({ key: \"only\", ic: \"👑\", label: `Only child`,           value: `× 1.15`,                                 cls: \"add\" });\n  if (isDiv)  items.push({ key: \"div\",  ic: \"💔\", label: `Divorced/Widowed`,    value: `× 0.65`,                                 cls: \"discount\" });\n  if (activeTab === \"bride\") {\n    if (brideEduName)  items.push({ key: \"bedu\",  ic: \"🎓\", label: `Bride's Edu: ${brideEduName}`,   value: `−${BRIDE_EDUCATION[+$(\"b_edu\").value][1]}% discount`,   cls: \"discount\" });\n    if (brideProfName) items.push({ key: \"bprof\", ic: \"👰\", label: `Bride's Job: ${brideProfName}`,  value: `−${BRIDE_PROFESSIONS[+$(\"b_prof\").value][1]}% discount`, cls: \"discount\" });\n    items.push({ key: \"btotal\", ic: \"💚\", label: `Total bride discount (cap 75%)`,                  value: `${brideDiscount.toFixed(0)}% off`,                       cls: \"discount\" });\n  }\n  if (gAcres > 0) items.push({ key: \"gland\", ic: \"🌾\", label: `Groom's land: ${gAcres} acres`, value: `+₹${fmtLakh(gLandVal)}`,        cls: \"add\" });\n  if (bAcres > 0) items.push({ key: \"bland\", ic: \"🌾\", label: `Bride's land: ${bAcres} acres`, value: `+₹${fmtLakh(bLandVal * 0.5)} (50% of value)`, cls: \"add\" });\n\n  return { final, items, raw: core, isMatrilineal, isMahr, isNRI,\n           groomMeta: { state, prof, edu, caste, income, age, ageLabel, loc, gAcres, gLandVal, bAcres, bLandVal } };\n}\n\nfunction verdictFor(final) {\n  for (const v of VERDICTS) {\n    if (final < v.max) return { ...v, quip: pick(v.quips) };\n  }\n  return VERDICTS[VERDICTS.length - 1];\n}\n\n/* ============================================================\n   RESULT RENDERING\n   ============================================================ */\nfunction rollNumber(el, target, durMs) {\n  const start = performance.now();\n  const startVal = 0;\n  const isInt = Math.round(target) === target;\n  function tick(now) {\n    const t = Math.min(1, (now - start) / durMs);\n    const eased = 1 - Math.pow(1 - t, 3);\n    const cur = startVal + (target - startVal) * eased;\n    el.textContent = fmtRupees(cur);\n    if (t < 1) requestAnimationFrame(tick);\n    else el.textContent = fmtRupees(target);\n  }\n  requestAnimationFrame(tick);\n}\n\nlet lastResult = null;\n$(\"calcBtn\").addEventListener(\"click\", () => {\n  const btn = $(\"calcBtn\");\n  btn.dataset.loading = \"true\";\n  setTimeout(() => {\n    btn.dataset.loading = \"false\";\n    const result = compute();\n    lastResult = result;\n    showResult(result);\n  }, 1200 + Math.random() * 600);\n});\n\nfunction showResult(result) {\n  const { final, items, isMatrilineal, isMahr, isNRI, groomMeta } = result;\n  const res = $(\"results\");\n  res.classList.add(\"show\");\n\n  // Aunty quote (refresh each calculation)\n  newAuntyQuote();\n\n  const verdict = verdictFor(final);\n  // Set number\n  rollNumber($(\"resultAmount\"), final, 2000);\n\n  // Sub text variations for matrilineal / mahr / NRI\n  let sub = \"satirical estimate · rounded to nearest ₹50,000\";\n  if (isMatrilineal) sub = \"MATRILINEAL — this is what the GROOM'S family contributes 🎉\";\n  else if (isMahr) sub = \"INVERSE FLOW — in Islam, this would be Mahr paid by the groom\";\n  if (isNRI) sub += \" · \" + fmtUSD(final) + \" in USD\";\n  $(\"resultSub\").textContent = sub;\n\n  // Reality-check sanity warnings\n  const rc = $(\"realityCheck\");\n  rc.classList.remove(\"show\", \"warn\", \"danger\", \"ok\");\n  if (final > 500 && final <= 2000) {\n    rc.classList.add(\"show\", \"warn\");\n    rc.innerHTML = `⚠️ <b>This demand exceeds ₹5 Cr<\u002Fb> — in the top 1% of reported cases. Typically seen in: AP/Telangana Reddy community + IAS + NRI combinations.`;\n  } else if (final > 2000) {\n    rc.classList.add(\"show\", \"danger\");\n    rc.innerHTML = `🚨 <b>This result (₹20 Cr+) reflects extreme high-end community demands<\u002Fb>, like documented AP Reddy cases. For most of India, this is exceptional — and unambiguously illegal.`;\n  } else if (final > 0 && final < 2) {\n    rc.classList.add(\"show\", \"ok\");\n    rc.innerHTML = `✅ <b>Very low demand<\u002Fb> — typical for matrilineal states, SC/ST communities, or Buddhist / Muslim Mahr-system contexts.`;\n  } else if (final === 0) {\n    rc.classList.add(\"show\", \"ok\");\n    rc.innerHTML = `🎉 <b>Zero dowry detected<\u002Fb> — matrilineal society or progressive family. Either way, society wins.`;\n  }\n\n  // Verdict\n  const vEl = $(\"verdict\");\n  vEl.dataset.tier = verdict.tier;\n  $(\"verdictEmoji\").textContent = verdict.emoji;\n  $(\"verdictText\").textContent = verdict.text;\n  $(\"verdictQuip\").textContent = verdict.quip;\n\n  // Breakdown cards\n  const bk = $(\"breakdown\");\n  bk.innerHTML = \"\";\n  items.forEach((it, i) => {\n    const card = document.createElement(\"div\");\n    card.className = `b-card ${it.cls}`;\n    card.style.animationDelay = (i * 80) + \"ms\";\n    card.innerHTML = `\n      <div class=\"top\"><span class=\"ic\">${it.ic}<\u002Fspan><span>factor ${String(i+1).padStart(2,'0')}<\u002Fspan><\u002Fdiv>\n      <div class=\"label\">${it.label}<\u002Fdiv>\n      <div class=\"value\">${it.value}<\u002Fdiv>\n    `;\n    bk.appendChild(card);\n  });\n\n  // ===== NEW: render all extended cards =====\n  renderCarCard(final);\n  renderGoldCard(final);\n  renderLandCard(groomMeta);\n  renderPropertyCard(final);\n  renderAppliancesCard(final);\n  renderWeddingCard(final);\n  renderYearsCard(final);\n  renderEMICard(final);\n  renderLeaderboard(groomMeta.state[0]);\n  staggerInfoCards();\n\n  // Special: result > 1 Cr -> screen flash\n  if (final >= 100) {\n    document.body.classList.add(\"flashing\");\n    setTimeout(() => document.body.classList.remove(\"flashing\"), 1300);\n  }\n  // Result = 0 -> confetti\n  if (final < 1.5) confetti();\n\n  // Scroll into view (using window.scrollBy/scrollTo, NOT scrollIntoView)\n  requestAnimationFrame(() => {\n    const top = res.getBoundingClientRect().top + window.scrollY - 60;\n    window.scrollTo({ top, behavior: \"smooth\" });\n  });\n}\n\nfunction confetti() {\n  const wrap = document.createElement(\"div\");\n  wrap.className = \"confetti\";\n  document.body.appendChild(wrap);\n  const colors = [\"#FF6B00\", \"#D4AF37\", \"#2ECC71\", \"#8B0000\", \"#F2CD5C\"];\n  for (let i = 0; i < 80; i++) {\n    const s = document.createElement(\"span\");\n    s.style.left = (Math.random() * 100) + \"%\";\n    s.style.background = colors[i % colors.length];\n    s.style.animationDuration = (2.5 + Math.random() * 2) + \"s\";\n    s.style.animationDelay = (Math.random() * 0.4) + \"s\";\n    s.style.transform = `rotate(${Math.random()*360}deg)`;\n    wrap.appendChild(s);\n  }\n  setTimeout(() => wrap.remove(), 4500);\n}\n\n/* ============================================================\n   SHARE\n   ============================================================ */\nfunction shareText() {\n  if (!lastResult) return \"\";\n  return `My dahej calculator result: ₹${fmtLakh(lastResult.final)} 😅\\nCheck yours: ${location.href}\\n(It's satire. Relax.)`;\n}\n$(\"shareWA\").addEventListener(\"click\", () => {\n  const url = \"https://wa.me/?text=\" + encodeURIComponent(shareText());\n  window.open(url, \"_blank\", \"noopener\");\n});\n$(\"shareTW\").addEventListener(\"click\", () => {\n  const url = \"https://twitter.com/intent/tweet?text=\" + encodeURIComponent(shareText());\n  window.open(url, \"_blank\", \"noopener\");\n});\n$(\"shareCopy\").addEventListener(\"click\", async (e) => {\n  const t = shareText();\n  try {\n    await navigator.clipboard.writeText(t);\n    const btn = e.currentTarget;\n    const prev = btn.innerHTML;\n    btn.innerHTML = \"✅ Copied!\";\n    setTimeout(() => btn.innerHTML = prev, 1500);\n  } catch (err) {\n    // fallback\n    const ta = document.createElement(\"textarea\");\n    ta.value = t; document.body.appendChild(ta); ta.select();\n    try { document.execCommand(\"copy\"); } catch (_) {}\n    ta.remove();\n  }\n});\n\n/* ============================================================\n   AUNTY QUOTES\n   ============================================================ */\nlet lastAuntyIdx = -1;\nfunction newAuntyQuote() {\n  let idx;\n  do { idx = Math.floor(Math.random() * AUNTY_QUOTES.length); }\n  while (idx === lastAuntyIdx && AUNTY_QUOTES.length > 1);\n  lastAuntyIdx = idx;\n  $(\"auntyQuote\").textContent = AUNTY_QUOTES[idx];\n  const card = $(\"auntyCard\");\n  card.classList.remove(\"bounce\");\n  // force reflow to restart animation\n  void card.offsetWidth;\n  card.classList.add(\"bounce\");\n}\n$(\"auntyNew\").addEventListener(\"click\", newAuntyQuote);\n\n/* ============================================================\n   EXTENDED CARDS RENDERING\n   ============================================================ */\nfunction pickTier(final, table) {\n  for (const row of table) if (final < row[0]) return row;\n  return table[table.length - 1];\n}\n\nfunction renderCarCard(finalLakhs) {\n  const t = pickTier(finalLakhs, CAR_TIERS);\n  // t = [maxLakhs, emoji, name, tagline, samplePriceLakhs]\n  $(\"carEmoji\").textContent = t[1];\n  $(\"carName\").textContent = t[2];\n  $(\"carTagline\").textContent = t[3];\n  // how many Maruti Altos (~₹3.5L) could the colony share\n  const altos = Math.floor((finalLakhs * 100000) / 350000);\n  $(\"carCompare\").textContent = altos > 0\n    ? `or, ${altos.toLocaleString(\"en-IN\")} Maruti Altos for the entire colony.`\n    : `Not even one Maruti Alto. Time to walk.`;\n}\n\nfunction renderGoldCard(finalLakhs) {\n  const rupees = finalLakhs * 100000;\n  const grams = rupees / GOLD_RATE_PER_GRAM;\n  const kg = grams / 1000;\n  $(\"goldAmt\").textContent = `${Math.round(grams).toLocaleString(\"en-IN\")} g`;\n  $(\"goldKg\").innerHTML = `${kg.toFixed(2)} kg of 22k gold @ ₹${GOLD_RATE_PER_GRAM.toLocaleString(\"en-IN\")}/g (May 2026 rate)`;\n  // sets\n  const setG = 158;\n  const sets = Math.floor(grams / setG);\n  const remainder = Math.round(grams - sets * setG);\n  // chips show breakdown of one full set times count + remainder\n  const chips = $(\"goldChips\");\n  chips.innerHTML = \"\";\n  function chip(text) { const s = document.createElement(\"span\"); s.className = \"chip\"; s.textContent = text; chips.appendChild(s); }\n  if (sets >= 1) {\n    chip(`${sets} mangalsutra${sets > 1 ? \"s\" : \"\"}`);\n    chip(`${sets} necklace set${sets > 1 ? \"s\" : \"\"}`);\n    chip(`${sets * 2} pairs bangles`);\n    chip(`${sets} pairs earrings`);\n    chip(`${sets} chain${sets > 1 ? \"s\" : \"\"}`);\n    chip(`${sets} ring${sets > 1 ? \"s\" : \"\"}`);\n  } else {\n    chip(\"not even one full set\");\n  }\n  if (remainder > 0) chip(`+ ${remainder}g extra`);\n  // funny line\n  let q;\n  if (grams < 50)   q = \"Less gold than a typical engagement ring. Aunties are disappointed.\";\n  else if (grams < 200) q = \"A decent jewellery set. Manageable.\";\n  else if (grams < 500) q = \"Walking gold mine. Her neck will hurt.\";\n  else if (grams < 1000) q = \"She'll need a locker. And a bodyguard.\";\n  else if (grams < 3000) q = \"Fort Knox called. They're worried.\";\n  else q = \"Congratulations, you've purchased a small gold reserve.\";\n  $(\"goldQuip\").textContent = q;\n}\n\nfunction renderLandCard(groomMeta) {\n  const { gAcres, gLandVal, bAcres, bLandVal, state } = groomMeta;\n  const total = gLandVal + bLandVal;\n  const valEl = $(\"landValue\");\n  const det = $(\"landDetail\");\n  const q = $(\"landQuip\");\n  if (gAcres === 0 && bAcres === 0) {\n    valEl.textContent = \"₹0\";\n    det.textContent = \"No land declared on either side — pure cash + saman bundle.\";\n    q.textContent = \"Aunty says: 'Beta, gaadi toh chahiye hi.'\";\n    return;\n  }\n  valEl.textContent = `₹${fmtLakh(total)}`;\n  const parts = [];\n  if (gAcres > 0) parts.push(`Groom: ${gAcres} acre${gAcres>1?\"s\":\"\"} (~₹${fmtLakh(gLandVal)})`);\n  if (bAcres > 0) parts.push(`Bride: ${bAcres} acre${bAcres>1?\"s\":\"\"} (~₹${fmtLakh(bLandVal)})`);\n  det.innerHTML = parts.join(\" · \") + ` · @ ${state[0]} rates`;\n  if (total > 200) q.textContent = \"Multiple villages later, this is essentially a zamindari merger.\";\n  else if (total > 50) q.textContent = \"Land + cash combo. Property lawyers are smiling.\";\n  else q.textContent = \"Modest landholding — still moves the needle.\";\n}\n\nfunction renderPropertyCard(finalLakhs) {\n  const rupees = finalLakhs * 100000;\n  const list = $(\"propList\");\n  list.innerHTML = \"\";\n  const choices = [\n    { ...PROPERTY_PRICES.metro,  emoji: \"🏙️\", note: \"Mumbai apartment\" },\n    { ...PROPERTY_PRICES.tier1,  emoji: \"🏘️\", note: \"Pune house\" },\n    { ...PROPERTY_PRICES.tier2,  emoji: \"🏡\", note: \"Jaipur house\" },\n    { ...PROPERTY_PRICES.rural,  emoji: \"🌾\", note: \"Rural bungalow plot\" }\n  ];\n  choices.forEach(c => {\n    const sqft = Math.floor(rupees / c.ppsf);\n    const label = bhkLabel(sqft);\n    const row = document.createElement(\"div\");\n    row.className = \"prop-row\";\n    row.innerHTML = `<span class=\"pe\">${c.emoji}<\u002Fspan>\n      <span class=\"city\">${c.name}<\u002Fspan>\n      <span class=\"desc\">~ <b style=\"color: var(--text);\">${sqft.toLocaleString(\"en-IN\")} sqft<\u002Fb> · ${label}<\u002Fspan>`;\n    list.appendChild(row);\n  });\n}\n\nfunction renderAppliancesCard(finalLakhs) {\n  const rupees = finalLakhs * 100000;\n  const budget = rupees * 0.30; // 30% of dowry\n  let spent = 0;\n  const list = $(\"applList\");\n  list.innerHTML = \"\";\n  APPLIANCES.forEach(([name, price]) => {\n    const fits = (spent + price) <= budget;\n    if (fits) spent += price;\n    const row = document.createElement(\"div\");\n    row.className = `appl-row ${fits ? \"included\" : \"excluded\"}`;\n    row.innerHTML = `<span class=\"mark\">${fits ? \"✅\" : \"❌\"}<\u002Fspan>\n      <span>${name}<\u002Fspan>\n      <span class=\"price\">₹${(price/1000).toFixed(0)}K<\u002Fspan>`;\n    list.appendChild(row);\n  });\n  const remaining = Math.max(0, budget - spent);\n  $(\"applTotal\").innerHTML =\n    `Saman total: <b>₹${fmtLakh(spent / 100000)}<\u002Fb> · Remaining budget cash: <b>₹${fmtLakh(remaining / 100000)}<\u002Fb> · 30% saman budget: <b>₹${fmtLakh(budget / 100000)}<\u002Fb>`;\n}\n\nfunction renderWeddingCard(finalLakhs) {\n  const t = pickTier(finalLakhs, WEDDING_TIERS);\n  $(\"wedEmoji\").textContent = t[1];\n  $(\"wedName\").textContent  = t[2];\n  $(\"wedDesc\").textContent  = t[3];\n}\n\nfunction renderYearsCard(finalLakhs) {\n  const total = finalLakhs * 100000;\n  const yearly = 60000;\n  const years = total / yearly;\n  const months = Math.round(total / 5000);\n  const annualSalaries = total / 300000;\n  const yEl = $(\"yearsNum\");\n  yEl.textContent = years.toFixed(1).replace(/\\.0$/, \"\");\n  yEl.className = \"years-number\";\n  let cls = \"bad\", ctx = \"\";\n  if (years < 1)        { cls = \"ok\";   ctx = \"✅ Rare but achievable. You got lucky.\"; }\n  else if (years < 5)   { cls = \"warn\"; ctx = \"😰 Years of saving for one day. Worth it?\"; }\n  else if (years < 15)  { cls = \"bad\";  ctx = `😱 ${years.toFixed(0)} years of savings. That's ${Math.floor(years)} family vacations not taken.`; }\n  else if (years < 30)  { cls = \"bad\";  ctx = `💀 ${years.toFixed(0)} years. Your child will be grown up by then.`; }\n  else if (years < 50)  { cls = \"bad\";  ctx = `☠️ ${years.toFixed(0)} years. That's a full working career — gone.`; }\n  else                  { cls = \"bad\";  ctx = `🚨 IMPOSSIBLE — this demand is beyond a lifetime of savings.`; }\n  yEl.classList.add(cls);\n  $(\"yearsCtx\").textContent = ctx;\n  const mini = $(\"yearsMini\");\n  mini.innerHTML = \"\";\n  function pill(t) { const el = document.createElement(\"span\"); el.className = \"pill\"; el.innerHTML = `<span class=\"dot\"><\u002Fspan>${t}`; mini.appendChild(el); }\n  pill(`${months.toLocaleString(\"en-IN\")} months`);\n  pill(`${years.toFixed(1)} years`);\n  pill(`${(years/10).toFixed(1)} decade${years/10 >= 2 ? \"s\" : \"\"}`);\n  pill(`${annualSalaries.toFixed(1)} annual salaries`);\n}\n\nfunction renderEMICard(finalLakhs) {\n  const principal = finalLakhs * 100000;\n  const grid = $(\"emiGrid\");\n  grid.innerHTML = \"\";\n  const r = 0.12 / 12;\n  const tenures = [\n    { y: 1, label: \"1 Year Plan\" },\n    { y: 2, label: \"2 Year Plan\" },\n    { y: 3, label: \"3 Year Plan\" }\n  ];\n  let maxEmi = 0;\n  tenures.forEach(t => {\n    const n = t.y * 12;\n    const emi = principal === 0 ? 0 : principal * r * Math.pow(1+r, n) / (Math.pow(1+r, n) - 1);\n    const tot = emi * n;\n    const interest = tot - principal;\n    if (emi > maxEmi) maxEmi = emi;\n    const card = document.createElement(\"div\");\n    card.className = \"emi-card\" + (emi > 50000 ? \" high\" : \"\");\n    card.innerHTML = `\n      <div class=\"label-top\">${t.label}<\u002Fdiv>\n      <div class=\"emi-val\">₹${Math.round(emi).toLocaleString(\"en-IN\")}<span style=\"font-size: 14px; color: var(--text-mute); font-family: 'DM Sans', sans-serif;\"> / mo<\u002Fspan><\u002Fdiv>\n      <div class=\"row-mini\"><span>Interest<\u002Fspan><b>₹${Math.round(interest).toLocaleString(\"en-IN\")}<\u002Fb><\u002Fdiv>\n      <div class=\"row-mini\"><span>Total payable<\u002Fspan><b>₹${Math.round(tot).toLocaleString(\"en-IN\")}<\u002Fb><\u002Fdiv>\n      <div class=\"row-mini\"><span>Free by<\u002Fspan><b>${new Date(Date.now() + n * 30.4 * 86400 * 1000).toLocaleDateString(\"en-IN\", { month: \"short\", year: \"numeric\" })}<\u002Fb><\u002Fdiv>\n      ${emi > 50000 ? '<div style=\"margin-top: 8px; color: var(--danger); font-size: 12px; font-weight: 700;\">⚠️ EMI &gt; ₹50K/mo<\u002Fdiv>' : \"\"}\n    `;\n    grid.appendChild(card);\n  });\n  // 3-year interest summary\n  const n = 36, emi3 = principal === 0 ? 0 : principal * r * Math.pow(1+r, n) / (Math.pow(1+r, n) - 1);\n  const interest3 = (emi3 * n) - principal;\n  $(\"emiFoot\").innerHTML = `Total interest paid to bank over 3 years: <b style=\"color: var(--danger);\">₹${Math.round(interest3).toLocaleString(\"en-IN\")}<\u002Fb> · Congratulations! You're now in dowry debt. Banks thank you.`;\n}\n\nfunction renderLeaderboard(userStateName) {\n  const list = $(\"lbList\");\n  list.innerHTML = \"\";\n  const data = [...LEADERBOARD];\n  const max = Math.max(...data.map(r => r[1]));\n  const inTop = data.some(r => r[0] === userStateName);\n  data.forEach(([name, val], i) => {\n    const row = document.createElement(\"div\");\n    row.className = \"lb-row\" + (name === userStateName ? \" user\" : \"\");\n    row.innerHTML = `\n      <div class=\"lb-rank\">#${i+1}<\u002Fdiv>\n      <div class=\"lb-bar-wrap\">\n        <div class=\"lb-bar\" style=\"width: 0%;\"><\u002Fdiv>\n        <div class=\"lb-name\">${name}<\u002Fdiv>\n        ${name === userStateName ? '<div class=\"lb-here\">📍 You are here<\u002Fdiv>' : \"\"}\n      <\u002Fdiv>\n      <div class=\"lb-val\">₹${val}L<\u002Fdiv>\n    `;\n    list.appendChild(row);\n    // animate width in\n    requestAnimationFrame(() => {\n      row.querySelector(\".lb-bar\").style.width = (val/max*100) + \"%\";\n    });\n  });\n  if (!inTop && userStateName) {\n    const row = document.createElement(\"div\");\n    row.className = \"lb-row user\";\n    row.innerHTML = `\n      <div class=\"lb-rank\">📍<\u002Fdiv>\n      <div class=\"lb-bar-wrap\">\n        <div class=\"lb-bar\" style=\"width: 0%;\"><\u002Fdiv>\n        <div class=\"lb-name\">${userStateName}<\u002Fdiv>\n        <div class=\"lb-here\">📍 your state (not top 10)<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"lb-val\">—<\u002Fdiv>\n    `;\n    list.appendChild(row);\n  }\n}\n\nfunction staggerInfoCards() {\n  document.querySelectorAll(\".info-card, .full-card\").forEach((c, i) => {\n    c.style.animation = \"none\";\n    void c.offsetWidth;\n    c.style.animation = \"\";\n    c.style.animationDelay = (100 + i * 100) + \"ms\";\n  });\n}\n\n/* ============================================================\n   COMPARE TAB\n   ============================================================ */\nfunction populateCompareSelects() {\n  // States\n  [\"cA_state\", \"cB_state\"].forEach(id => {\n    const sel = $(id);\n    STATES.forEach((s, i) => sel.appendChild(buildOption(`${s[2]}  ${s[0]}`, i)));\n    sel.value = 11; // Delhi default\n  });\n  $(\"cB_state\").value = 0; // UP\n  // Professions\n  [\"cA_prof\", \"cB_prof\"].forEach(id => {\n    const sel = $(id);\n    PROFESSIONS.forEach((p, i) => {\n      const opt = buildOption(`${p[0]}    [${p[1] === \"SP\" ? \"S+\" : p[1]}]`, i);\n      sel.appendChild(opt);\n    });\n  });\n  $(\"cA_prof\").value = 9;  // FAANG\n  $(\"cB_prof\").value = 0;  // IAS officer\n  // Education\n  [\"cA_edu\", \"cB_edu\"].forEach(id => {\n    const sel = $(id);\n    EDUCATION.forEach((e, i) => sel.appendChild(buildOption(e[0], i)));\n    sel.value = 0; // IIT default\n  });\n  // Caste\n  [\"cA_caste\", \"cB_caste\"].forEach(id => {\n    const sel = $(id);\n    CASTES.forEach((c, i) => sel.appendChild(buildOption(c[0], i)));\n    sel.value = 5; // Brahmin (Upper)\n  });\n\n  // Slider labels\n  function wireSlider(prefix, max) {\n    const inc = $(`${prefix}_income`);\n    function up() {\n      const b = INCOME_BANDS[+inc.value];\n      $(`${prefix}_income_label`).textContent = b[0];\n      $(`${prefix}_income_band`).textContent = b[1];\n      inc.style.setProperty(\"--p\", (+inc.value / 6 * 100) + \"%\");\n    }\n    inc.addEventListener(\"input\", up); up();\n\n    const age = $(`${prefix}_age`);\n    function upAge() {\n      const a = +age.value;\n      const [, label] = AGE_BRACKETS(a, \"groom\");\n      $(`${prefix}_age_label`).textContent = a;\n      $(`${prefix}_age_band`).textContent = label;\n      age.style.setProperty(\"--p\", ((a - +age.min) / (+age.max - +age.min) * 100) + \"%\");\n    }\n    age.addEventListener(\"input\", upAge); upAge();\n  }\n  wireSlider(\"cA\");\n  wireSlider(\"cB\");\n}\npopulateCompareSelects();\n\n// Simplified single-groom calc for compare mode (uses same new formula, no land/extras/NRI)\nfunction calculateSingle(inp) {\n  const state  = STATES[inp.stateIdx];\n  const prof   = PROFESSIONS[inp.profIdx];\n  const edu    = EDUCATION[inp.eduIdx];\n  const caste  = CASTES[inp.casteIdx];\n  const income = INCOME_BANDS[inp.incomeIdx];\n  const [ageAdj] = AGE_BRACKETS(inp.age, \"groom\");\n  let core = state[1] * prof[2];\n  core = core + (core * (edu[1] / 100));\n  core = core + (core * (income[2] / 100));\n  core = core + ageAdj;\n  core = core * caste[1];\n  core = core * 1.2;  // assume Tier-1 location for fairness\n  core = Math.round(core * 20) / 20;\n  if (core < 0) core = 0;\n  return { final: core, state, prof, edu, caste, income, ageAdj };\n}\n\n$(\"compareBtn\").addEventListener(\"click\", () => {\n  const btn = $(\"compareBtn\");\n  btn.dataset.loading = \"true\";\n  setTimeout(() => {\n    btn.dataset.loading = \"false\";\n    const A = calculateSingle({\n      stateIdx: +$(\"cA_state\").value,\n      profIdx: +$(\"cA_prof\").value,\n      eduIdx: +$(\"cA_edu\").value,\n      casteIdx: +$(\"cA_caste\").value,\n      incomeIdx: +$(\"cA_income\").value,\n      age: +$(\"cA_age\").value\n    });\n    const B = calculateSingle({\n      stateIdx: +$(\"cB_state\").value,\n      profIdx: +$(\"cB_prof\").value,\n      eduIdx: +$(\"cB_edu\").value,\n      casteIdx: +$(\"cB_caste\").value,\n      incomeIdx: +$(\"cB_income\").value,\n      age: +$(\"cB_age\").value\n    });\n    renderCompare(A, B);\n  }, 900 + Math.random() * 500);\n});\n\nfunction renderCompare(A, B) {\n  const wrap = $(\"compareResults\");\n  wrap.classList.add(\"show\");\n  $(\"cRA_amt\").textContent = \"₹\" + fmtLakh(A.final);\n  $(\"cRB_amt\").textContent = \"₹\" + fmtLakh(B.final);\n  $(\"cRA_sub\").textContent = `${A.prof[0]} · ${A.state[0]}`;\n  $(\"cRB_sub\").textContent = `${B.prof[0]} · ${B.state[0]}`;\n\n  const aEl = $(\"cRA\"), bEl = $(\"cRB\");\n  aEl.classList.remove(\"winner\", \"loser\");\n  bEl.classList.remove(\"winner\", \"loser\");\n  if (A.final === B.final) {\n    $(\"cSaves\").textContent = \"🤝 Identical demand. Tie. Either way, society loses.\";\n  } else if (A.final < B.final) {\n    aEl.classList.add(\"winner\"); bEl.classList.add(\"loser\");\n    $(\"cSaves\").innerHTML = `💚 Bride's family saves <b>₹${fmtLakh(B.final - A.final)}<\u002Fb> by choosing <b>Groom A<\u002Fb>.`;\n  } else {\n    bEl.classList.add(\"winner\"); aEl.classList.add(\"loser\");\n    $(\"cSaves\").innerHTML = `💚 Bride's family saves <b>₹${fmtLakh(A.final - B.final)}<\u002Fb> by choosing <b>Groom B<\u002Fb>.`;\n  }\n\n  // diff cards\n  const diff = $(\"cDiff\");\n  diff.innerHTML = \"\";\n  const diffs = [\n    [\"📍 State\",       A.state[0],  B.state[0],  A.state[1],  B.state[1]],\n    [\"💼 Profession\",  A.prof[0],   B.prof[0],   A.prof[2],   B.prof[2]],\n    [\"🎓 Education\",   A.edu[0],    B.edu[0],    A.edu[1],    B.edu[1]],\n    [\"🕌 Caste\",       A.caste[0].split(\" (\")[0], B.caste[0].split(\" (\")[0], A.caste[1], B.caste[1]],\n    [\"🏦 Income\",      A.income[0], B.income[0], A.income[2], B.income[2]]\n  ];\n  diffs.forEach((d, i) => {\n    const card = document.createElement(\"div\");\n    card.className = \"b-card add\";\n    card.style.animationDelay = (i * 80) + \"ms\";\n    card.innerHTML = `\n      <div class=\"top\"><span>${d[0]}<\u002Fspan><\u002Fdiv>\n      <div class=\"label\" style=\"color: var(--saffron-2);\">A: ${d[1]}<\u002Fdiv>\n      <div class=\"label\" style=\"color: var(--gold-2); margin-top:4px;\">B: ${d[2]}<\u002Fdiv>\n    `;\n    diff.appendChild(card);\n  });\n  // scroll into view\n  requestAnimationFrame(() => {\n    const top = wrap.getBoundingClientRect().top + window.scrollY - 60;\n    window.scrollTo({ top, behavior: \"smooth\" });\n  });\n}\n\n/* ============================================================\n   RECEIPT DOWNLOAD\n   ============================================================ */\n$(\"shareReceipt\").addEventListener(\"click\", async (e) => {\n  if (!lastResult) return;\n  const btn = e.currentTarget;\n  const prev = btn.innerHTML;\n  btn.innerHTML = \"⏳ Generating...\";\n  // Populate receipt\n  const meta = lastResult.groomMeta;\n  const final = lastResult.final;\n  const rupees = final * 100000;\n  // cash component = total - gold - car - land - appliances\n  const goldGrams = Math.round(rupees / GOLD_RATE_PER_GRAM);\n  const goldValue = goldGrams * GOLD_RATE_PER_GRAM;\n  const carTier = pickTier(final, CAR_TIERS);\n  const carPrice = Math.min(carTier[4] * 100000, rupees * 0.2);\n  const landValue = (meta.gLandVal + meta.bLandVal) * 100000;\n  const applBudget = rupees * 0.30;\n  let applSpent = 0;\n  APPLIANCES.forEach(([n, p]) => { if (applSpent + p <= applBudget) applSpent += p; });\n  const cash = Math.max(0, rupees - goldValue - carPrice - landValue - applSpent);\n\n  $(\"rcptInv\").textContent = \"DAHEJ-\" + String(Math.floor(Math.random() * 900000) + 100000);\n  $(\"rcptDate\").textContent = new Date().toLocaleDateString(\"en-IN\", { year: \"numeric\", month: \"short\", day: \"numeric\" });\n  $(\"rcptProf\").textContent = meta.prof[0];\n  $(\"rcptEdu\").textContent  = meta.edu[0];\n  $(\"rcptStCa\").textContent = meta.state[0] + \" · \" + meta.caste[0].split(\" (\")[0];\n  $(\"rcptCash\").textContent = \"₹\" + cash.toLocaleString(\"en-IN\");\n  $(\"rcptGoldG\").textContent = goldGrams.toLocaleString(\"en-IN\");\n  $(\"rcptGold\").textContent = \"₹\" + Math.round(goldValue).toLocaleString(\"en-IN\");\n  $(\"rcptCarName\").textContent = carTier[2].split(\" / \")[0];\n  $(\"rcptCar\").textContent = \"₹\" + Math.round(carPrice).toLocaleString(\"en-IN\");\n  $(\"rcptLandAc\").textContent = (meta.gAcres + meta.bAcres).toString();\n  $(\"rcptLand\").textContent = \"₹\" + Math.round(landValue).toLocaleString(\"en-IN\");\n  $(\"rcptAppl\").textContent = \"₹\" + Math.round(applSpent).toLocaleString(\"en-IN\");\n  const sub = cash + goldValue + carPrice + landValue + applSpent;\n  $(\"rcptSub\").textContent = \"₹\" + Math.round(sub).toLocaleString(\"en-IN\");\n  $(\"rcptTotal\").textContent = \"₹\" + Math.round(rupees).toLocaleString(\"en-IN\");\n\n  // Render with html2canvas\n  const stage = $(\"receiptStage\");\n  // Bring on-screen for accurate rendering\n  stage.style.left = \"0px\";\n  stage.style.top = \"0px\";\n  stage.style.zIndex = \"-1\";\n  try {\n    const canvas = await html2canvas(stage, { backgroundColor: \"#ffffff\", scale: 2, useCORS: true });\n    const link = document.createElement(\"a\");\n    link.download = `dahej-receipt-${Date.now()}.png`;\n    link.href = canvas.toDataURL(\"image/png\");\n    link.click();\n  } catch (err) {\n    alert(\"Could not generate receipt: \" + err.message);\n  }\n  // Hide back off-screen\n  stage.style.left = \"-10000px\";\n  stage.style.top = \"0px\";\n  stage.style.zIndex = \"\";\n  btn.innerHTML = \"✅ Receipt downloaded!\";\n  setTimeout(() => btn.innerHTML = prev, 1800);\n});\n\n/* ============================================================\n   LUCIDE\n   ============================================================ */\nif (window.lucide) lucide.createIcons();\n\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
